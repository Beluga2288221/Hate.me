<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Hate Me</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root { --bg: #050505; --s1: #0f0f0f; --s2: #161616; --t1: #f0f0f0; --t3: #555; --acc: #ffffff; --bd: rgba(255,255,255,0.06); --on: #00ff66; --err: #ff4d4d; }
  * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--t1); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; }

  /* АНИМАЦИИ */
  @keyframes entrance { from { opacity: 0; transform: scale(1.05); filter: blur(10px); } to { opacity: 1; transform: scale(1); filter: blur(0); } }
  @keyframes msgPop { from { transform: scale(0.9) translateY(10px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
  .anim-enter { animation: entrance 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
  .anim-msg { animation: msgPop 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }

  /* UI */
  #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .auth-card { width: 360px; background: rgba(15,15,15,0.8); backdrop-filter: blur(20px); padding: 40px; border-radius: 40px; border: 1px solid var(--bd); }
  .input-box { background: var(--s2); border: 1px solid var(--bd); padding: 16px; border-radius: 20px; color: #fff; width: 100%; margin-bottom: 12px; }
  .btn-p { background: var(--acc); color: #000; font-weight: 700; padding: 18px; border-radius: 20px; border: none; cursor: pointer; width: 100%; }

  #app-screen { display: none; width: 100%; height: 100vh; }
  .sidebar { width: 350px; border-right: 1px solid var(--bd); background: var(--s1); display: flex; flex-direction: column; z-index: 10; transition: 0.4s; }
  .chat-area { flex: 1; display: flex; flex-direction: column; background: #080808; }

  @media (max-width: 768px) {
    .sidebar { width: 100%; position: absolute; left: 0; top: 0; height: 100%; }
    .sidebar.mobile-hide { transform: translateX(-100%); }
    .pc-only { display: none; }
  }

  .bubble { max-width: 75%; padding: 14px 18px; border-radius: 22px; font-size: 14px; margin-bottom: 4px; }
  .bubble.me { align-self: flex-end; background: var(--acc); color: #000; border-bottom-right-radius: 4px; }
  .bubble.to { align-self: flex-start; background: var(--s2); color: #fff; border-bottom-left-radius: 4px; }

  #settings { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 3000; display: none; align-items: center; justify-content: center; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card anim-enter">
    <h1 style="margin-bottom:20px; letter-spacing:-2px">Hate Me</h1>
    <input type="email" id="email" class="input-box" placeholder="Email">
    <input type="password" id="pass" class="input-box" placeholder="Password">
    <button class="btn-p" id="login-btn">Connect</button>
    <p id="auth-err" style="color:var(--err); font-size:10px; margin-top:10px; text-align:center; display:none">Ошибка доступа</p>
  </div>
</div>

<div id="app-screen">
  <aside class="sidebar" id="side-ui">
    <div style="padding:30px 25px; display:flex; justify-content:space-between; align-items:center">
      <h2>Chats</h2>
      <i data-lucide="settings" id="open-set-btn" style="cursor:pointer; color:var(--t3)"></i>
    </div>
    <div style="padding:0 20px 20px"><input type="text" id="find" class="input-box" placeholder="Search @user + Enter"></div>
    <div id="contacts" style="flex:1; overflow-y:auto"></div>
    <div style="padding:20px; border-top:1px solid var(--bd); display:flex; align-items:center; gap:12px">
      <div id="u-nick" style="font-weight:700">@user</div>
    </div>
  </aside>

  <main class="chat-area">
    <div id="header" style="padding:15px 25px; border-bottom:1px solid var(--bd); display:flex; align-items:center; gap:12px" class="hidden">
      <i data-lucide="chevron-left" id="back-btn" style="cursor:pointer"></i>
      <div id="c-nick" style="font-weight:700">@nick</div>
    </div>
    <div id="messages" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column"></div>
    <div id="input-ui" style="padding:20px; display:flex; gap:12px" class="hidden">
      <input type="text" id="msg-t" class="input-box" placeholder="Message..." style="margin-bottom:0">
      <button id="send-btn" style="background:var(--acc); border:none; width:52px; height:52px; border-radius:18px; cursor:pointer"><i data-lucide="send" style="color:#000"></i></button>
    </div>
  </main>
</div>

<div id="settings">
  <div class="auth-card">
    <h2>Profile</h2>
    <input type="text" id="set-n" class="input-box" placeholder="@username">
    <input type="text" id="set-v" class="input-box" placeholder="Avatar URL">
    <button class="btn-p" id="save-set-btn">Save</button>
    <button id="close-set-btn" style="background:none; color:var(--t3); border:none; margin-top:10px; cursor:pointer; width:100%">Back</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, onSnapshot, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const cfg = { apiKey: "AIzaSyA-PLDvaLnzoJWTWJb17U4FJU0ziQfL0eU", authDomain: "hate-24365.firebaseapp.com", projectId: "hate-24365", storageBucket: "hate-24365.firebasestorage.app", appId: "1:990484802574:web:56e00d91e1e58df144a05f" };
  const app = initializeApp(cfg);
  const db = getFirestore(app);
  let _me = null, _to = null, _sub = null;

  lucide.createIcons();

  const isMobile = window.innerWidth < 768;

  // ВХОД
  document.getElementById('login-btn').addEventListener('click', async () => {
    const m = document.getElementById('email').value.trim().toLowerCase();
    const p = document.getElementById('pass').value;
    const s = await getDoc(doc(db, "users", m));
    
    if(s.exists() && s.data().password === p) {
      _me = { ...s.data(), email: m };
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('app-screen').style.display = 'flex';
      document.getElementById('u-nick').innerText = "@" + _me.nick;
    } else {
      document.getElementById('auth-err').style.display = 'block';
    }
  });

  // ПОИСК
  document.getElementById('find').addEventListener('keypress', async (e) => {
    if(e.key === 'Enter') {
      const v = e.target.value.replace('@','').toLowerCase();
      const q = query(collection(db, "users"), where("nick", "==", v));
      const s = await getDocs(q);
      const list = document.getElementById('contacts');
      list.innerHTML = "";
      s.forEach(d => {
        const u = d.data();
        if(d.id === _me.email) return;
        const div = document.createElement('div');
        div.style = "padding:15px 20px; cursor:pointer; border-bottom:1px solid var(--bd)";
        div.innerHTML = `<b>@${u.nick}</b>`;
        div.onclick = () => openChat(u, d.id);
        list.appendChild(div);
      });
    }
  });

  function openChat(user, email) {
    _to = { ...user, email: email };
    document.getElementById('header').classList.remove('hidden');
    document.getElementById('input-ui').classList.remove('hidden');
    document.getElementById('c-nick').innerText = "@" + user.nick;
    if(isMobile) document.getElementById('side-ui').classList.add('mobile-hide');
    loadMessages();
  }

  function loadMessages() {
    if(_sub) _sub();
    const id = [_me.email, _to.email].sort().join('_');
    _sub = onSnapshot(collection(db, "chats", id, "messages"), (s) => {
      const box = document.getElementById('messages');
      box.innerHTML = "";
      let ms = []; s.forEach(d => ms.push(d.data()));
      ms.sort((a,b) => a.time - b.time).forEach(m => {
        const d = document.createElement('div');
        d.className = `bubble anim-msg ${m.from === _me.email ? 'me' : 'to'}`;
        d.innerText = m.text;
        box.appendChild(d);
      });
      box.scrollTop = box.scrollHeight;
    });
  }

  // ОТПРАВКА
  document.getElementById('send-btn').addEventListener('click', async () => {
    const t = document.getElementById('msg-t');
    if(!t.value.trim()) return;
    const id = [_me.email, _to.email].sort().join('_');
    await addDoc(collection(db, "chats", id, "messages"), { from: _me.email, text: t.value, time: Date.now() });
    t.value = "";
  });

  // НАСТРОЙКИ
  document.getElementById('open-set-btn').onclick = () => {
    document.getElementById('set-n').value = _me.nick;
    document.getElementById('settings').style.display = 'flex';
  };
  document.getElementById('close-set-btn').onclick = () => document.getElementById('settings').style.display = 'none';
  
  document.getElementById('save-set-btn').onclick = async () => {
    const n = document.getElementById('set-n').value.trim();
    if(n.length < 3) return alert("Short nick");
    await updateDoc(doc(db, "users", _me.email), { nick: n });
    _me.nick = n;
    document.getElementById('u-nick').innerText = "@" + n;
    document.getElementById('settings').style.display = 'none';
  };

  document.getElementById('back-btn').onclick = () => document.getElementById('side-ui').classList.remove('mobile-hide');
</script>
</body>
</html>
