<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hate Me</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --bg: #030303; --card: #0a0a0a; --t1: #ffffff; --t3: #555; 
            --acc: #ffffff; --bd: rgba(255,255,255,0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--t1); font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }

        /* Контейнер входа */
        .auth-container { width: min(90%, 360px); text-align: center; }
        .logo { font-size: 32px; font-weight: 700; margin-bottom: 40px; }
        .auth-box { background: var(--card); border: 1px solid var(--bd); padding: 30px; border-radius: 24px; }
        
        .input-group { margin-bottom: 15px; }
        input { 
            width: 100%; padding: 16px; border-radius: 12px; border: none; 
            background: #f0f4f8; color: #000; font-size: 14px; 
        }
        
        .btn-main { 
            width: 100%; padding: 16px; border-radius: 12px; border: none; 
            background: #fff; color: #000; font-weight: 700; cursor: pointer; margin-top: 10px;
        }
        .btn-sub { background: none; color: #777; font-size: 13px; margin-top: 15px; cursor: pointer; border: none; width: 100%; }

        /* Профиль (скрыт по умолчанию) */
        #profile-screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        .avatar { width: 100px; height: 100px; background: #222; border-radius: 50%; margin-bottom: 20px; border: 1px solid var(--bd); overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .info-card { width: 80%; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--bd); margin-bottom: 10px; text-align: left; }
        .label { font-size: 11px; color: var(--t3); text-transform: uppercase; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <div class="logo">Hate Me</div>
        <div class="auth-box">
            <div class="input-group"><input type="email" id="email" placeholder="Email"></div>
            <div class="input-group"><input type="password" id="pass" placeholder="Password"></div>
            <button class="btn-main" id="login-btn">Войти</button>
            <button class="btn-sub" id="reg-btn">Нет аккаунта? Регистрация</button>
        </div>
    </div>

    <div id="profile-screen">
        <div class="avatar"><img id="user-av" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky"></div>
        <div class="info-card">
            <div class="label">Имя</div>
            <div id="p-name">Загрузка...</div>
        </div>
        <div class="info-card">
            <div class="label">Никнейм</div>
            <div id="p-nick">@...</div>
        </div>
        <button class="btn-sub" onclick="location.reload()">Выйти</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Эти данные Vercel подставит сам, если ты используешь сборщик.
        // Если нет — впиши ключи сюда вручную из image_416f3c.png для теста.
        const firebaseConfig = {
            apiKey: "AIzaSyA-PLDvaLnzoJWTWJb17U4FJU0ziQfL0eU", // Вставь свой ключ из Vercel
            authDomain: "hate-24365.firebaseapp.com",
            projectId: "hate-24365",
            storageBucket: "hate-24365.firebasestorage.app",
            appId: "1:990484802574:web:56e00d91e1e58df144a05f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function auth(mode) {
            const email = document.getElementById('email').value.toLowerCase().trim();
            const pass = document.getElementById('pass').value;

            if(!email || !pass) return alert("Заполни поля!");

            try {
                const userRef = doc(db, "users", email);
                const snap = await getDoc(userRef);

                if (mode === 'login') {
                    if (snap.exists() && snap.data().password === pass) {
                        renderProfile(snap.data());
                    } else {
                        alert("Неверные данные");
                    }
                } else {
                    if (snap.exists()) return alert("Уже занято!");
                    const newUser = { name: "x", nick: email.split('@')[0], password: pass };
                    await setDoc(userRef, newUser);
                    renderProfile(newUser);
                }
            } catch (e) {
                console.error(e);
                alert("Ошибка базы. Проверь Rules в Firebase!");
            }
        }

        function renderProfile(user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('profile-screen').style.display = 'flex';
            document.getElementById('p-name').innerText = user.name || "Без имени";
            document.getElementById('p-nick').innerText = "@" + (user.nick || "anon");
        }

        document.getElementById('login-btn').onclick = () => auth('login');
        document.getElementById('reg-btn').onclick = () => auth('reg');
    </script>
</body>
</html>
