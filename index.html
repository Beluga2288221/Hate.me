<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Hate Me</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root { 
    --bg: #030303; --card: #0a0a0a; --s2: #121212; --t1: #ffffff; --t3: #555; 
    --acc: #ffffff; --bd: rgba(255,255,255,0.08); --on: #00ff66; --blur: blur(25px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
  body { 
    background: var(--bg); color: var(--t1); font-family: 'DM Sans', sans-serif; 
    height: 100dvh; overflow: hidden; display: flex;
  }

  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  #toast { 
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
    background: #fff; color: #000; padding: 12px 24px; border-radius: 12px; 
    font-size: 14px; font-weight: 700; z-index: 5000; display: none;
  }

  /* AUTH */
  #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .auth-box { width: min(90%, 380px); background: var(--card); border-radius: 30px; border: 1px solid var(--bd); overflow: hidden; }
  .auth-tabs { display: flex; border-bottom: 1px solid var(--bd); }
  .tab { flex: 1; padding: 20px; text-align: center; font-size: 12px; font-weight: 700; cursor: pointer; color: var(--t3); text-transform: uppercase; }
  .tab.active { color: #fff; background: rgba(255,255,255,0.02); }
  .input-box { width: 100%; background: #e8f0fe; border: none; padding: 16px; border-radius: 15px; color: #000; font-size: 14px; margin-bottom: 15px; }
  .btn-p { width: 100%; padding: 18px; border-radius: 15px; border: none; background: #fff; color: #000; font-weight: 700; cursor: pointer; }

  /* APP */
  #app-screen { display: none; width: 100%; height: 100%; }
  .sidebar { width: 380px; background: var(--card); border-right: 1px solid var(--bd); display: flex; flex-direction: column; z-index: 10; }
  .chat-area { flex: 1; background: var(--bg); display: flex; flex-direction: column; position: relative; }

  @media (max-width: 768px) {
    .sidebar { width: 100%; position: absolute; inset: 0; }
    .sidebar.hide { display: none; }
  }

  .contact-item { padding: 18px 25px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid var(--bd); }
  .contact-item:hover { background: rgba(255,255,255,0.02); }
  
  .av-main { width: 45px; height: 45px; border-radius: 50%; background: #222; overflow: hidden; object-fit: cover; flex-shrink: 0; }
  .av-chat { width: 40px; height: 40px; border-radius: 50%; background: #222; overflow: hidden; object-fit: cover; }

  .bubble { max-width: 80%; padding: 14px 18px; border-radius: 20px; font-size: 14px; margin-bottom: 6px; }
  .bubble.me { align-self: flex-end; background: #fff; color: #000; border-bottom-right-radius: 4px; }
  .bubble.to { align-self: flex-start; background: var(--s2); color: #fff; border-bottom-left-radius: 4px; }

  /* SETTINGS */
  #settings-panel { 
    position: fixed; inset: 0; background: rgba(5,5,5,0.92); backdrop-filter: var(--blur); 
    z-index: 4000; display: none; flex-direction: column; align-items: center; padding: 40px 20px;
    animation: fade 0.3s ease; overflow-y: auto;
  }
  .settings-container { width: min(100%, 500px); }
  .section-title { font-size: 11px; color: var(--t3); text-transform: uppercase; font-weight: 800; margin: 30px 0 15px 10px; letter-spacing: 1px; }
  .set-card { 
    background: var(--card); padding: 20px; border-radius: 22px; 
    border: 1px solid var(--bd); margin-bottom: 10px; display: flex; align-items: center; gap: 15px;
  }
  .set-card-content { flex: 1; }
  .set-card-label { font-size: 10px; color: var(--t3); text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }
  
  .av-upload-box { position: relative; width: 120px; height: 120px; margin: 0 auto 20px; cursor: pointer; }
  .av-upload-box img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid var(--bd); }
  .av-upload-box .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; }
  .av-upload-box:hover .overlay { opacity: 1; }

  .device-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid var(--bd); }
  .device-item:last-child { border: none; }

  .pc-hide { display: none; }
  @media (max-width: 768px) { .pc-hide { display: block; } }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="toast"></div>

<div id="auth-screen">
  <div style="font-size: 40px; font-weight: 700; margin-bottom: 30px; letter-spacing: -2px">Hate Me</div>
  <div class="auth-box">
    <div class="auth-tabs">
      <div class="tab active" id="t-login" onclick="setAuth('login')">Вход</div>
      <div class="tab" id="t-reg" onclick="setAuth('reg')">Рега</div>
    </div>
    <div class="auth-body" id="auth-fields"></div>
  </div>
</div>

<div id="app-screen">
  <aside class="sidebar" id="sidebar">
    <div style="padding:30px; display:flex; justify-content:space-between; align-items:center">
      <h2 style="letter-spacing:-1px">Сообщения</h2>
      <i data-lucide="settings" onclick="toggleSettings()" style="cursor:pointer; color:var(--t3)" class="gear-icon"></i>
    </div>
    <div style="padding:0 25px 20px"><input type="text" id="find" class="input-box" placeholder="Поиск @user..." style="background:var(--s2); color:#fff; margin:0"></div>
    <div id="contacts" style="flex:1; overflow-y:auto"></div>
  </aside>

  <main class="chat-area">
    <div id="chat-header" class="hidden" style="padding:20px 30px; border-bottom:1px solid var(--bd); display:flex; align-items:center; gap:15px">
        <i data-lucide="chevron-left" class="pc-hide" onclick="closeChatMobile()" style="cursor:pointer"></i>
        <img id="chat-av" class="av-chat" src="">
        <div>
            <div id="chat-title" style="font-weight:700">Имя</div>
            <div style="font-size:10px; color:var(--on)">Онлайн</div>
        </div>
    </div>
    <div id="messages" style="flex:1; overflow-y:auto; padding:30px; display:flex; flex-direction:column"></div>
    <div id="input-bar" class="hidden" style="padding:25px; display:flex; gap:15px">
        <input type="text" id="msg-input" class="input-box" placeholder="Написать..." style="background:var(--s2); color:#fff; margin:0; border-radius:20px">
        <button onclick="sendMsg()" style="background:#fff; border:none; width:55px; height:55px; border-radius:20px; cursor:pointer"><i data-lucide="send" style="color:#000; width:20px"></i></button>
    </div>
  </main>
</div>

<div id="settings-panel">
  <div class="settings-container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h1>Профиль</h1>
        <i data-lucide="x" onclick="toggleSettings()" style="cursor:pointer"></i>
    </div>

    <div class="av-upload-box" onclick="document.getElementById('av-input').click()">
        <img id="my-av-img" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
        <div class="overlay"><i data-lucide="camera" style="color:#fff"></i></div>
        <input type="file" id="av-input" hidden accept="image/*" onchange="uploadAv(this)">
    </div>

    <div class="section-title">Основное</div>
    <div class="set-card" onclick="changeField('name')">
        <div class="set-card-content"><div class="set-card-label">Имя</div><span id="s-name">User</span></div>
        <i data-lucide="chevron-right" style="color:var(--t3)"></i>
    </div>
    <div class="set-card" onclick="changeField('nick')">
        <div class="set-card-content"><div class="set-card-label">Твой @user</div><span id="s-nick">@not_set</span></div>
        <i data-lucide="chevron-right" style="color:var(--t3)"></i>
    </div>

    <div class="section-title">Конфиденциальность</div>
    <div class="set-card" style="display:block">
        <div class="set-card-label" style="margin-bottom:15px">Активные устройства</div>
        <div id="device-list"></div>
    </div>

    <button class="btn-p" onclick="logout()" style="margin-top:40px; background:rgba(255,0,0,0.1); color:#ff4d4d">Выйти из аккаунта</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, onSnapshot, addDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const cfg = { apiKey: "AIzaSyA-PLDvaLnzoJWTWJb17U4FJU0ziQfL0eU", authDomain: "hate-24365.firebaseapp.com", projectId: "hate-24365", storageBucket: "hate-24365.firebasestorage.app", appId: "1:990484802574:web:56e00d91e1e58df144a05f" };
  const app = initializeApp(cfg);
  const db = getFirestore(app);

  let _me = null, _to = null, _code = "", _mode = 'login', _sub = null, _chatsSub = null;
  const notify = (t) => { const el = document.getElementById('toast'); el.innerText = t; el.style.display = 'block'; setTimeout(() => el.style.display='none', 3000); };
  const updateIcons = () => lucide.createIcons();

  function getDeviceInfo() {
    const ua = navigator.userAgent;
    let name = "Windows PC", icon = "monitor";
    if (/iPhone/.test(ua)) { name = "iPhone"; icon = "smartphone"; }
    else if (/Android/.test(ua)) { name = "Android Device"; icon = "smartphone"; }
    else if (/Macintosh/.test(ua)) { name = "Mac / iMac"; icon = "laptop"; }
    return { name, icon, id: Math.random().toString(36).substr(2, 6) };
  }

  window.onload = async () => {
    const saved = localStorage.getItem('hate_session');
    if(saved) {
        const data = JSON.parse(saved);
        const s = await getDoc(doc(db, "users", data.email));
        if(s.exists()) { _me = { ...s.data(), email: data.email }; enterApp(); }
    }
  };

  window.setAuth = (m) => { _mode = m; document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.id === 't-'+m)); renderAuth(); };
  
  function renderAuth(step = 1) {
    const box = document.getElementById('auth-fields');
    if(_mode === 'login') {
      box.innerHTML = `<input type="email" id="l-email" class="input-box" placeholder="Email"><input type="password" id="l-pass" class="input-box" placeholder="Пароль"><button class="btn-p" onclick="doLogin()">Войти</button>`;
    } else {
      if(step === 1) box.innerHTML = `<input type="email" id="r-email" class="input-box" placeholder="Email"><button class="btn-p" onclick="sendCode()">Код</button>`;
      else if(step === 2) box.innerHTML = `<input type="text" id="r-code" class="input-box" style="text-align:center" placeholder="Код"><button class="btn-p" onclick="verify()">Ок</button>`;
      else box.innerHTML = `<input type="password" id="r-pass" class="input-box" placeholder="Пароль"><button class="btn-p" onclick="finishReg()">Готово</button>`;
    }
  }
  renderAuth();

  window.sendCode = async () => {
    const email = document.getElementById('r-email').value;
    _code = Math.floor(100000 + Math.random() * 900000).toString();
    await fetch('https://server-roan-omega.vercel.app/send-code', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ email, code: _code }) });
    renderAuth(2);
  };

  window.verify = () => { if(document.getElementById('r-code').value === _code) renderAuth(3); };

  window.finishReg = async () => {
    const email = document.getElementById('r-email').value, pass = document.getElementById('r-pass').value;
    const user = { name: "User", nick: "", password: pass, devices: [getDeviceInfo()], myChats: [], av: "" };
    await setDoc(doc(db, "users", email), user);
    _me = { ...user, email }; enterApp();
  };

  window.doLogin = async () => {
    const m = document.getElementById('l-email').value, p = document.getElementById('l-pass').value;
    const s = await getDoc(doc(db, "users", m));
    if(s.exists() && s.data().password === p) {
        _me = { ...s.data(), email: m };
        await updateDoc(doc(db, "users", m), { devices: arrayUnion(getDeviceInfo()) });
        enterApp();
    } else notify("Ошибка входа");
  };

  function enterApp() {
    localStorage.setItem('hate_session', JSON.stringify({ email: _me.email, time: Date.now() }));
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    updateInfo();
    listenMyChats();
  }

  function updateInfo() {
    document.getElementById('s-name').innerText = _me.name;
    document.getElementById('s-nick').innerText = _me.nick ? "@" + _me.nick : "не задан";
    if(_me.av) document.getElementById('my-av-img').src = _me.av;
    
    const devList = document.getElementById('device-list'); devList.innerHTML = "";
    (_me.devices || []).forEach(d => {
        devList.innerHTML += `<div class="device-item"><i data-lucide="${d.icon}"></i><div style="flex:1"><b>${d.name}</b><div style="font-size:10px;color:var(--t3)">Активен</div></div></div>`;
    });
    updateIcons();
  }

  // ЗАГРУЗКА АВАТАРКИ
  window.uploadAv = (input) => {
    const file = input.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onloadend = async () => {
        const base64 = reader.result;
        // Сжатие на скорую руку через Canvas (опционально, но лучше для БД)
        const img = new Image();
        img.src = base64;
        img.onload = async () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 200; canvas.height = 200;
            ctx.drawImage(img, 0, 0, 200, 200);
            const compressed = canvas.toDataURL('image/jpeg', 0.7);
            await updateDoc(doc(db, "users", _me.email), { av: compressed });
            _me.av = compressed;
            updateInfo();
            notify("Аватарка обновлена");
        };
    };
    reader.readAsDataURL(file);
  };

  function listenMyChats() {
    if(_chatsSub) _chatsSub();
    _chatsSub = onSnapshot(doc(db, "users", _me.email), (snap) => {
        const myChats = snap.data().myChats || [];
        const list = document.getElementById('contacts');
        list.innerHTML = "";
        myChats.forEach(async (chatEmail) => {
            const uDoc = await getDoc(doc(db, "users", chatEmail));
            if(uDoc.exists()) {
                const u = uDoc.data();
                const div = document.createElement('div');
                div.className = "contact-item";
                const avImg = u.av || 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=';
                div.innerHTML = `<img src="${avImg}" class="av-main"><div><b>${u.name}</b><div style="font-size:11px;color:var(--t3)">@${u.nick}</div></div>`;
                div.onclick = () => openChat(u, chatEmail);
                list.appendChild(div);
            }
        });
    });
  }

  window.toggleSettings = () => {
    const p = document.getElementById('settings-panel');
    p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
  };

  window.changeField = async (t) => {
    const val = prompt("Введите значение:"); if(!val) return;
    let up = {}; if(t === 'name') up.name = val;
    else { const c = val.replace('@','').toLowerCase().trim(); if(c.length < 5) return notify("Минимум 5 симв."); up.nick = c; }
    await updateDoc(doc(db, "users", _me.email), up);
    Object.assign(_me, up); updateInfo();
  };

  document.getElementById('find').addEventListener('keypress', async (e) => {
    if(e.key === 'Enter') {
      const v = e.target.value.replace('@','').toLowerCase().trim();
      const q = query(collection(db, "users"), where("nick", "==", v));
      const s = await getDocs(q);
      if(s.empty) return notify("Не найден");
      s.forEach(d => { if(d.id !== _me.email) openChat(d.data(), d.id); });
    }
  });

  function openChat(user, email) {
    _to = { ...user, email };
    document.getElementById('chat-header').classList.remove('hidden');
    document.getElementById('input-bar').classList.remove('hidden');
    document.getElementById('chat-title').innerText = user.name;
    document.getElementById('chat-av').src = user.av || 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=';
    if(window.innerWidth <= 768) document.getElementById('sidebar').classList.add('hide');
    loadMsgs();
  }

  window.closeChatMobile = () => document.getElementById('sidebar').classList.remove('hide');

  function loadMsgs() {
    if(_sub) _sub();
    const id = [_me.email, _to.email].sort().join('_');
    _sub = onSnapshot(collection(db, "chats", id, "messages"), (s) => {
      const box = document.getElementById('messages'); box.innerHTML = "";
      let ms = []; s.forEach(d => ms.push(d.data()));
      ms.sort((a,b)=>a.time-b.time).forEach(m => {
        const d = document.createElement('div');
        d.className = `bubble ${m.from === _me.email ? 'me' : 'to'}`;
        d.innerText = m.text; box.appendChild(d);
      });
      box.scrollTop = box.scrollHeight;
    });
  }

  window.sendMsg = async () => {
    const inp = document.getElementById('msg-input'); if(!inp.value.trim()) return;
    const id = [_me.email, _to.email].sort().join('_');
    await updateDoc(doc(db, "users", _me.email), { myChats: arrayUnion(_to.email) });
    await updateDoc(doc(db, "users", _to.email), { myChats: arrayUnion(_me.email) });
    await addDoc(collection(db, "chats", id, "messages"), { from: _me.email, text: inp.value, time: Date.now() });
    inp.value = "";
  };

  window.logout = () => { localStorage.removeItem('hate_session'); location.reload(); };
</script>
</body>
</html>
