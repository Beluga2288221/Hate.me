<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Hate Me</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root { --bg: #050505; --s1: #0f0f0f; --s2: #161616; --t1: #f0f0f0; --t3: #555; --acc: #ffffff; --bd: rgba(255,255,255,0.06); --on: #00ff66; --err: #ff4d4d; }
  * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
  body { background: var(--bg); color: var(--t1); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; }

  #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
  .auth-card { width: 360px; background: rgba(15,15,15,0.8); backdrop-filter: blur(20px); padding: 40px; border-radius: 40px; border: 1px solid var(--bd); }
  .input-box { background: var(--s2); border: 1px solid var(--bd); padding: 16px; border-radius: 20px; color: #fff; width: 100%; margin-bottom: 12px; }
  .btn-p { background: var(--acc); color: #000; font-weight: 700; padding: 18px; border-radius: 20px; border: none; cursor: pointer; width: 100%; transition: 0.3s; }
  
  #app-screen { display: none; width: 100%; height: 100vh; flex-direction: row; }
  .sidebar { width: 350px; border-right: 1px solid var(--bd); background: var(--s1); display: flex; flex-direction: column; }
  .chat-area { flex: 1; display: flex; flex-direction: column; background: #080808; }

  .bubble { max-width: 75%; padding: 14px 18px; border-radius: 22px; font-size: 14px; margin-bottom: 4px; }
  .bubble.me { align-self: flex-end; background: var(--acc); color: #000; border-bottom-right-radius: 4px; }
  .bubble.to { align-self: flex-start; background: var(--s2); color: #fff; border-bottom-left-radius: 4px; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="auth-screen">
  <h1 style="font-size: 48px; margin-bottom: 30px; letter-spacing: -2px;">Hate Me</h1>
  <div class="auth-card">
    <div id="login-form">
      <input type="email" id="email" class="input-box" placeholder="Email">
      <input type="password" id="pass" class="input-box" placeholder="Password">
      <button class="btn-p" id="btn-login">Connect</button>
      <p id="auth-err" style="color:var(--err); font-size:12px; margin-top:10px; text-align:center; display:none">Ошибка доступа</p>
      <div style="text-align:center; margin-top:20px; font-size:12px; color:var(--t3); cursor:pointer" id="btn-go-reg">Create account</div>
    </div>
  </div>
</div>

<div id="app-screen">
  <aside class="sidebar">
    <div style="padding:30px; display:flex; justify-content:space-between;">
      <h2>Chats</h2>
      <i data-lucide="settings" id="btn-open-set" style="cursor:pointer; color:var(--t3)"></i>
    </div>
    <div id="contacts" style="flex:1; overflow-y:auto; padding: 0 20px;"></div>
  </aside>
  <main class="chat-area">
    <div id="messages" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column"></div>
  </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const cfg = { 
    apiKey: "AIzaSyA-PLDvaLnzoJWTWJb17U4FJU0ziQfL0eU", 
    authDomain: "hate-24365.firebaseapp.com", 
    projectId: "hate-24365", 
    storageBucket: "hate-24365.firebasestorage.app", 
    appId: "1:990484802574:web:56e00d91e1e58df144a05f" 
  };
  
  const app = initializeApp(cfg);
  const db = getFirestore(app);
  let _me = null;

  lucide.createIcons();

  // ФУНКЦИЯ ВХОДА
  const doLogin = async () => {
    const m = document.getElementById('email').value.trim().toLowerCase();
    const p = document.getElementById('pass').value.trim();
    if(!m || !p) return;

    try {
      const s = await getDoc(doc(db, "users", m));
      if(s.exists() && s.data().password === p) {
        _me = { ...s.data(), email: m };
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('app-screen').style.display = 'flex';
        console.log("Logged in!");
      } else {
        document.getElementById('auth-err').style.display = 'block';
      }
    } catch (e) {
      alert("Ошибка Firebase! Проверь Rules.");
      console.error(e);
    }
  };

  // ФУНКЦИЯ РЕГИСТРАЦИИ (ПРИМЕР)
  const doReg = async () => {
    const m = document.getElementById('email').value.trim().toLowerCase();
    const p = document.getElementById('pass').value.trim();
    if(!m || p.length < 6) return alert("Email и пароль (6+ знаков)");

    await setDoc(doc(db, "users", m), { 
      nick: m.split('@')[0], 
      password: p, 
      id: Date.now() 
    });
    alert("Аккаунт создан! Теперь жми Connect.");
  };

  // ПРИВЯЗКА К КНОПКАМ
  document.getElementById('btn-login').addEventListener('click', doLogin);
  document.getElementById('btn-go-reg').addEventListener('click', doReg);

</script>
</body>
</html>
