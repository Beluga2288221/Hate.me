<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Hate Me</title>

<script src="https://smtpjs.com/v3/smtp.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0a; --s1: #111; --s2: #181818;
    --t1: #f0f0f0; --t3: #666; --acc: #ffffff;
    --bd: rgba(255,255,255,0.08); --err: #ff4d4d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
  body { background: var(--bg); color: var(--t1); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; }

  /* --- АНИМАЦИИ --- */
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .anim-fade { animation: fadeIn 0.6s ease; }
  .anim-slide { animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }

  /* --- ЛОГО --- */
  .logo-container { margin-bottom: 40px; display: flex; flex-direction: column; align-items: center; animation: scaleIn 0.8s ease; }
  .logo-main { display: flex; flex-direction: column; line-height: 0.8; font-weight: 700; font-size: 72px; letter-spacing: -4px; }
  .logo-main .hate { color: var(--t3); }
  .logo-main .me { color: #fff; margin-left: 55px; }

  /* --- АВТОРИЗАЦИЯ --- */
  #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
  .auth-card { width: 100%; max-width: 400px; background: var(--s1); border: 1px solid var(--bd); border-radius: 32px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
  .auth-nav { display: flex; border-bottom: 1px solid var(--bd); }
  .auth-nav button { flex: 1; padding: 22px; background: none; border: none; color: var(--t3); font-weight: 700; cursor: pointer; transition: 0.3s; }
  .auth-nav button.active { color: #fff; background: rgba(255,255,255,0.03); }
  .auth-body { padding: 40px; min-height: 320px; position: relative; }
  .auth-step { display: none; }
  .auth-step.active { display: block; animation: slideUp 0.4s ease forwards; }

  /* --- ПРИЛОЖЕНИЕ --- */
  #app-screen { display: none; height: 100vh; width: 100%; opacity: 0; transform: scale(1.1); transition: 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
  #app-screen.visible { display: flex; opacity: 1; transform: scale(1); }
  
  .sidebar { width: 350px; background: var(--s1); border-right: 1px solid var(--bd); display: flex; flex-direction: column; }
  .search-wrapper { padding: 0 25px 15px; }
  .search-input { 
    width: 100%; background: var(--s2); border: 1px solid var(--bd); 
    padding: 14px 18px; border-radius: 14px; color: #fff; font-size: 14px;
    transition: all 0.3s;
  }

  .btn-main { 
    width: 100%; padding: 18px; border-radius: 16px; border: none; 
    background: var(--acc); color: #000; font-weight: 700; cursor: pointer; 
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
  }
  .btn-main:hover { transform: translateY(-3px); }

  .prof-box { 
    padding: 20px; border-top: 1px solid var(--bd); background: #0c0c0c; 
    display: flex; align-items: center; gap: 12px; cursor: pointer;
  }
  .my-av { width: 44px; height: 44px; border-radius: 14px; background: var(--s2); object-fit: cover; }
  
  #settings-modal { 
    position: absolute; inset: 0; background: var(--bg); z-index: 100; 
    display: none; flex-direction: column; padding: 30px; 
    backdrop-filter: blur(10px);
  }
  #settings-modal.active { display: flex; animation: fadeIn 0.4s ease; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="logo-container">
    <div class="logo-main"><span class="hate">Hate</span><span class="me">Me</span></div>
  </div>
  <div class="auth-card anim-slide">
    <div class="auth-nav">
        <button id="tab-login" class="active" onclick="switchAuth('login')">ВХОД</button>
        <button id="tab-reg" onclick="switchAuth('reg')">РЕГИСТРАЦИЯ</button>
    </div>
    <div class="auth-body">
        <div id="step-login" class="auth-step active">
            <div class="input-group" style="margin-bottom:20px;"><label style="display:block; font-size:10px; color:var(--t3); margin-bottom:8px;">Email</label><input type="email" id="l-email" style="width:100%; background:var(--s2); border:1px solid var(--bd); padding:15px; border-radius:16px; color:#fff;" placeholder="mail@hate.me"></div>
            <div class="input-group" style="margin-bottom:20px;"><label style="display:block; font-size:10px; color:var(--t3); margin-bottom:8px;">Пароль</label><input type="password" id="l-pass" style="width:100%; background:var(--s2); border:1px solid var(--bd); padding:15px; border-radius:16px; color:#fff;" placeholder="••••••••"></div>
            <button class="btn-main" onclick="loginUser()">Войти</button>
        </div>
        <div id="step-reg-1" class="auth-step">
            <div class="input-group" style="margin-bottom:20px;"><label style="display:block; font-size:10px; color:var(--t3); margin-bottom:8px;">Электронная почта</label><input type="email" id="r-email" style="width:100%; background:var(--s2); border:1px solid var(--bd); padding:15px; border-radius:16px; color:#fff;" placeholder="email@example.com"></div>
            <button class="btn-main" id="btn-get-code" onclick="sendCode()">Получить код</button>
        </div>
        <div id="step-reg-2" class="auth-step">
            <div class="input-group" style="margin-bottom:20px;"><label style="display:block; font-size:10px; color:var(--t3); margin-bottom:8px;">Код из письма</label><input type="text" id="r-code" maxlength="6" placeholder="000 000" style="width:100%; background:var(--s2); border:1px solid var(--bd); padding:15px; border-radius:16px; color:#fff; text-align:center; letter-spacing:5px; font-size:20px;"></div>
            <button class="btn-main" onclick="verifyCode()">Подтвердить</button>
        </div>
        <div id="step-reg-3" class="auth-step">
            <div class="input-group" style="margin-bottom:20px;"><label style="display:block; font-size:10px; color:var(--t3); margin-bottom:8px;">Придумайте пароль</label><input type="password" id="r-pass" style="width:100%; background:var(--s2); border:1px solid var(--bd); padding:15px; border-radius:16px; color:#fff;" placeholder="••••••••"></div>
            <button class="btn-main" id="btn-final-reg" onclick="registerUser()">Создать аккаунт</button>
        </div>
    </div>
  </div>
</div>

<div id="app-screen">
  <aside class="sidebar">
    <div style="padding: 30px 25px; display: flex; justify-content: space-between; align-items: center;">
        <div style="font-weight:700; font-size:22px; letter-spacing:-1px;">Hate Me</div>
        <button onclick="toggleSettings(true)" style="background:none; border:none; color:var(--t3); cursor:pointer;"><i data-lucide="settings"></i></button>
    </div>
    <div class="search-wrapper"><input type="text" class="search-input" id="global-search" placeholder="Поиск по ID (Enter)..."></div>
    <div style="flex:1; overflow-y:auto;" id="chatList"></div>
    <div class="prof-box" onclick="toggleSettings(true)">
        <img src="" id="ui-av" class="my-av" style="display:none">
        <div id="av-stub" style="width:44px; height:44px; border-radius:14px; background:#222; display:flex; align-items:center; justify-content:center;"><i data-lucide="user"></i></div>
        <div style="flex:1">
            <div id="ui-nick" style="font-weight:700; font-size:14px;">@username</div>
            <div id="ui-id" style="color:var(--t3); font-size:10px;">Hate ID: 0000000000</div>
        </div>
    </div>
  </aside>
  <main style="flex:1; position:relative; display:flex; align-items:center; justify-content:center; color:var(--t3);">
    <div id="settings-modal">
        <div style="display:flex; align-items:center; gap:20px; margin-bottom:40px;">
            <button onclick="toggleSettings(false)" style="background:none; border:none; color:#fff; cursor:pointer;"><i data-lucide="arrow-left"></i></button>
            <h2 style="font-size:20px;">Профиль</h2>
        </div>
        <div style="text-align:center; margin-bottom:20px;">
            <div style="width:100px; height:100px; border-radius:30px; background:#222; margin:0 auto; overflow:hidden; border:1px solid var(--bd); cursor:pointer;" onclick="document.getElementById('f-in').click()">
                <img id="set-av-pre" src="" style="width:100%; height:100%; object-fit:cover;">
                <input type="file" id="f-in" hidden accept="image/*" onchange="previewAv(this)">
            </div>
        </div>
        <div style="margin-bottom:20px;"><label style="display:block; font-size:10px; color:var(--t3); margin-bottom:8px;">Никнейм</label><input type="text" id="set-user" style="width:100%; background:var(--s2); border:1px solid var(--bd); padding:15px; border-radius:16px; color:#fff;"></div>
        <div style="margin-bottom:20px;"><label style="display:block; font-size:10px; color:var(--t3); margin-bottom:8px;">О себе</label><textarea id="set-bio" rows="3" style="width:100%; background:var(--s2); border:1px solid var(--bd); padding:15px; border-radius:16px; color:#fff; font-family:inherit;"></textarea></div>
        <button class="btn-main" onclick="saveData()">Сохранить</button>
    </div>
    <div class="anim-fade">Выберите чат, чтобы начать общение</div>
  </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-PLDvaLnzoJWTWJb17U4FJU0ziQfL0eU",
    authDomain: "hate-24365.firebaseapp.com",
    projectId: "hate-24365",
    storageBucket: "hate-24365.firebasestorage.app",
    messagingSenderId: "990484802574",
    appId: "1:990484802574:web:56e00d91e1e58df144a05f",
    measurementId: "G-Y9VXDHRH3C"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let tempGeneratedCode = "";
  let currentUserEmail = "";

  lucide.createIcons();

  window.switchAuth = (t) => {
    document.getElementById('tab-login').classList.toggle('active', t==='login');
    document.getElementById('tab-reg').classList.toggle('active', t==='reg');
    document.querySelectorAll('.auth-step').forEach(s => s.classList.remove('active'));
    document.getElementById(t==='login' ? 'step-login' : 'step-reg-1').classList.add('active');
  };

  window.nextStep = (n) => {
    document.querySelectorAll('.auth-step').forEach(s => s.classList.remove('active'));
    const step = document.getElementById('step-reg-'+n);
    if(step) step.classList.add('active');
  };

  window.sendCode = function() {
    const email = document.getElementById('r-email').value;
    if(!email || !email.includes('@')) return alert("Введите корректный Email!");
    
    tempGeneratedCode = Math.floor(100000 + Math.random() * 900000).toString();
    nextStep(2);
    
    console.log("%c [HATE ME DEBUG] Твой код: " + tempGeneratedCode, "background: #000; color: #fff; font-size: 20px; padding: 10px;");

    if (typeof Email !== 'undefined') {
        Email.send({
            Host : "smtp.gmail.com",
            Username : "weed.help.com@gmail.com",
            Password : "kgls dioz pxwk mtha",
            To : email,
            From : "weed.help.com@gmail.com",
            Subject : "Hate Me Code",
            Body : "Твой код регистрации: " + tempGeneratedCode
        }).then(msg => {
            if(msg !== "OK") console.error("Ошибка SMTP:", msg);
        });
    }
  };

  window.verifyCode = () => {
    if(document.getElementById('r-code').value.trim() === tempGeneratedCode) nextStep(3);
    else alert("Неверный код!");
  };

  window.registerUser = async () => {
    const email = document.getElementById('r-email').value;
    const pass = document.getElementById('r-pass').value;
    const hateID = Math.floor(1000000000 + Math.random() * 9000000000);

    try {
        await setDoc(doc(db, "users", email), { nick: email.split('@')[0], id: hateID, password: pass, bio: "", av: "" });
        currentUserEmail = email;
        showApp(email.split('@')[0], hateID);
    } catch (e) { alert("Ошибка базы данных!"); }
  };

  window.loginUser = async () => {
    const email = document.getElementById('l-email').value;
    const pass = document.getElementById('l-pass').value;
    const snap = await getDoc(doc(db, "users", email));
    if(snap.exists() && snap.data().password === pass) {
        currentUserEmail = email;
        showApp(snap.data().nick, snap.data().id, snap.data().av, snap.data().bio);
    } else alert("Неверные данные!");
  };

  function showApp(nick, id, av = "", bio = "") {
    document.getElementById('ui-nick').innerText = "@" + nick;
    document.getElementById('ui-id').innerText = "Hate ID: " + id;
    document.getElementById('set-user').value = nick;
    document.getElementById('set-bio').value = bio;
    if(av) {
        document.getElementById('ui-av').src = av;
        document.getElementById('ui-av').style.display = 'block';
        document.getElementById('av-stub').style.display = 'none';
        document.getElementById('set-av-pre').src = av;
    }
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    setTimeout(() => document.getElementById('app-screen').classList.add('visible'), 50);
    lucide.createIcons();
  }

  window.toggleSettings = (s) => document.getElementById('settings-modal').classList.toggle('active', s);
  window.previewAv = (input) => {
    const r = new FileReader();
    r.onload = (e) => document.getElementById('set-av-pre').src = e.target.result;
    r.readAsDataURL(input.files[0]);
  };

  window.saveData = async () => {
    const nick = document.getElementById('set-user').value;
    const bio = document.getElementById('set-bio').value;
    const av = document.getElementById('set-av-pre').src;
    await setDoc(doc(db, "users", currentUserEmail), { nick, bio, av: av.startsWith('data') ? av : "" }, { merge: true });
    location.reload();
  };

  document.getElementById('global-search').addEventListener('keypress', async (e) => {
    if(e.key === 'Enter') {
        const val = e.target.value.trim();
        const q = query(collection(db, "users"), where("id", "==", parseInt(val)));
        const snap = await getDocs(q);
        const list = document.getElementById('chatList');
        list.innerHTML = "";
        snap.forEach(doc => {
            const u = doc.data();
            list.innerHTML += `<div class="prof-box"><div>@${u.nick}</div><div style="font-size:10px;color:gray;">ID: ${u.id}</div></div>`;
        });
    }
  });
</script>
</body>
</html>
