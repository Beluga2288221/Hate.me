<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Hate Me</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root { --bg: #050505; --s1: #0f0f0f; --s2: #161616; --t1: #f0f0f0; --t3: #555; --acc: #ffffff; --bd: rgba(255,255,255,0.06); --on: #00ff66; --err: #ff4d4d; }
  * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--t1); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; }

  /* ТВОИ АНИМАЦИИ */
  @keyframes entrance { from { opacity: 0; transform: scale(1.05); filter: blur(10px); } to { opacity: 1; transform: scale(1); filter: blur(0); } }
  @keyframes msgPop { from { transform: scale(0.9) translateY(10px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
  .anim-enter { animation: entrance 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
  .anim-msg { animation: msgPop 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }

  /* ВЕРНУЛ ТВОЙ ЛОГОТИП */
  .logo-container { margin-bottom: 40px; display: flex; flex-direction: column; align-items: center; }
  .logo-main { display: flex; flex-direction: column; line-height: 0.8; font-weight: 700; font-size: 72px; letter-spacing: -4px; }
  .logo-main .hate { color: var(--t3); }
  .logo-main .me { color: #fff; margin-left: 55px; }

  /* AUTH CARD */
  #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
  .auth-card { width: 360px; background: rgba(15,15,15,0.8); backdrop-filter: blur(20px); padding: 40px; border-radius: 40px; border: 1px solid var(--bd); }
  .auth-step { display: none; }
  .auth-step.active { display: block; }

  /* UI */
  .input-box { background: var(--s2); border: 1px solid var(--bd); padding: 16px; border-radius: 20px; color: #fff; width: 100%; margin-bottom: 12px; }
  .btn-p { background: var(--acc); color: #000; font-weight: 700; padding: 18px; border-radius: 20px; border: none; cursor: pointer; width: 100%; transition: 0.3s; }
  
  /* APP */
  #app-screen { display: none; width: 100%; height: 100vh; }
  .sidebar { width: 350px; border-right: 1px solid var(--bd); background: var(--s1); display: flex; flex-direction: column; z-index: 10; transition: 0.4s; }
  .chat-area { flex: 1; display: flex; flex-direction: column; background: #080808; }

  @media (max-width: 768px) {
    .sidebar { width: 100%; position: absolute; left: 0; top: 0; height: 100%; }
    .sidebar.mobile-hide { transform: translateX(-100%); }
  }

  .bubble { max-width: 75%; padding: 14px 18px; border-radius: 22px; font-size: 14px; margin-bottom: 4px; }
  .bubble.me { align-self: flex-end; background: var(--acc); color: #000; border-bottom-right-radius: 4px; }
  .bubble.to { align-self: flex-start; background: var(--s2); color: #fff; border-bottom-left-radius: 4px; }

  #settings { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 3000; display: none; align-items: center; justify-content: center; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="logo-container anim-enter">
    <div class="logo-main"><span class="hate">Hate</span><span class="me">Me</span></div>
  </div>

  <div class="auth-card anim-enter">
    <div id="step-login" class="auth-step active">
      <input type="email" id="l-email" class="input-box" placeholder="Email">
      <input type="password" id="l-pass" class="input-box" placeholder="Password">
      <button class="btn-p" onclick="doLogin()">Connect</button>
      <div style="text-align:center; margin-top:20px; font-size:12px; color:var(--t3); cursor:pointer" onclick="goStep('reg1')">Create account</div>
    </div>

    <div id="step-reg1" class="auth-step">
      <input type="email" id="r-email" class="input-box" placeholder="Your Email">
      <button class="btn-p" id="send-btn" onclick="sendCode()">Get Code</button>
      <div style="text-align:center; margin-top:20px; font-size:12px; color:var(--t3); cursor:pointer" onclick="goStep('login')">Back</div>
    </div>

    <div id="step-reg2" class="auth-step">
      <p style="text-align:center; font-size:12px; margin-bottom:15px; color:var(--t3)">Enter 6-digit code</p>
      <input type="text" id="r-code" class="input-box" placeholder="000000" style="text-align:center; letter-spacing:8px">
      <button class="btn-p" onclick="verify()">Verify</button>
    </div>

    <div id="step-reg3" class="auth-step">
      <input type="password" id="r-pass" class="input-box" placeholder="Password (latin only)">
      <button class="btn-p" onclick="finishReg()">Complete</button>
    </div>
  </div>
</div>

<div id="app-screen">
  <aside class="sidebar" id="side-ui">
    <div style="padding:30px 25px; display:flex; justify-content:space-between; align-items:center">
      <h2 style="letter-spacing:-1px">Chats</h2>
      <i data-lucide="settings" onclick="openSet()" style="cursor:pointer; color:var(--t3)"></i>
    </div>
    <div style="padding:0 20px 20px"><input type="text" id="find" class="input-box" placeholder="Search @user + Enter"></div>
    <div id="contacts" style="flex:1; overflow-y:auto"></div>
    <div style="padding:20px; border-top:1px solid var(--bd); display:flex; align-items:center; gap:12px">
      <div id="my-av" style="width:40px; height:40px; border-radius:50%; background:#222; overflow:hidden"></div>
      <div>
        <div id="u-name" style="font-weight:700; font-size:14px">User</div>
        <div id="u-tag" style="font-size:10px; color:var(--t3)">@not_set</div>
      </div>
    </div>
  </aside>

  <main class="chat-area">
    <div id="header" style="padding:15px 25px; border-bottom:1px solid var(--bd); display:flex; align-items:center; gap:12px" class="hidden">
      <i data-lucide="chevron-left" class="mobile-only" onclick="backToList()" style="cursor:pointer"></i>
      <div id="c-av" style="width:38px; height:38px; border-radius:50%; background:#222; overflow:hidden"></div>
      <div><div id="c-nick" style="font-weight:700">@nick</div><div id="c-status" style="font-size:10px; color:var(--on)">online</div></div>
    </div>
    <div id="messages" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column"></div>
    <div id="input-ui" style="padding:20px; display:flex; gap:12px" class="hidden">
      <input type="text" id="msg-t" class="input-box" placeholder="Message..." style="margin-bottom:0; border-radius:18px">
      <button onclick="send()" style="background:var(--acc); border:none; width:52px; height:52px; border-radius:18px; cursor:pointer"><i data-lucide="send" style="color:#000"></i></button>
    </div>
  </main>
</div>

<div id="settings">
  <div class="auth-card">
    <h3 style="margin-bottom:20px">Settings</h3>
    <input type="text" id="set-name" class="input-box" placeholder="Your Name">
    <input type="text" id="set-tag" class="input-box" placeholder="@unique_tag (min 5, latin)">
    <input type="text" id="set-av" class="input-box" placeholder="Avatar URL">
    <button class="btn-p" onclick="saveSet()">Save Profile</button>
    <button style="background:none; border:none; color:var(--t3); margin-top:15px; cursor:pointer; width:100%" onclick="closeSet()">Close</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, onSnapshot, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const cfg = { apiKey: "AIzaSyA-PLDvaLnzoJWTWJb17U4FJU0ziQfL0eU", authDomain: "hate-24365.firebaseapp.com", projectId: "hate-24365", storageBucket: "hate-24365.firebasestorage.app", appId: "1:990484802574:web:56e00d91e1e58df144a05f" };
  const app = initializeApp(cfg);
  const db = getFirestore(app);
  let _me = null, _to = null, _sub = null, _code = "";

  lucide.createIcons();

  window.goStep = (s) => {
    document.querySelectorAll('.auth-step').forEach(el => el.classList.remove('active'));
    document.getElementById('step-' + s).classList.add('active');
  };

  window.sendCode = async () => {
    const email = document.getElementById('r-email').value;
    if(!email.includes('@')) return;
    _code = Math.floor(100000 + Math.random() * 900000).toString();
    await fetch('https://server-roan-omega.vercel.app/send-code', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email, code: _code })
    });
    goStep('reg2');
  };

  window.verify = () => { if(document.getElementById('r-code').value === _code) goStep('reg3'); };

  window.finishReg = async () => {
    const email = document.getElementById('r-email').value, pass = document.getElementById('r-pass').value;
    if(!/^[a-zA-Z0-9]+$/.test(pass)) return alert("Latin only!");
    const user = { name: "User", nick: "", password: pass, av: "", status: "online" };
    await setDoc(doc(db, "users", email), user);
    _me = { ...user, email }; enterApp();
  };

  window.doLogin = async () => {
    const m = document.getElementById('l-email').value, p = document.getElementById('l-pass').value;
    const s = await getDoc(doc(db, "users", m));
    if(s.exists() && s.data().password === p) { _me = { ...s.data(), email: m }; enterApp(); }
  };

  function enterApp() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app-screen').style.display = 'flex';
    update();
  }

  function update() {
    document.getElementById('u-name').innerText = _me.name;
    document.getElementById('u-tag').innerText = _me.nick ? "@"+_me.nick : "set @user in settings";
    if(_me.av) document.getElementById('my-av').innerHTML = `<img src="${_me.av}" style="width:100%;height:100%;object-fit:cover">`;
    updateDoc(doc(db, "users", _me.email), { status: 'online' });
    lucide.createIcons();
  }

  window.openSet = () => {
    document.getElementById('set-name').value = _me.name;
    document.getElementById('set-tag').value = _me.nick;
    document.getElementById('set-av').value = _me.av;
    document.getElementById('settings').style.display = 'flex';
  };

  window.saveSet = async () => {
    const name = document.getElementById('set-name').value;
    const nick = document.getElementById('set-tag').value.trim().replace('@','').toLowerCase();
    const av = document.getElementById('set-av').value;

    if(nick.length > 0) {
      if(nick.length < 5 || !/^[a-z0-9_]+$/.test(nick)) return alert("Tag: min 5, latin only");
      const q = query(collection(db, "users"), where("nick", "==", nick));
      const s = await getDocs(q);
      if(!s.empty && nick !== _me.nick) return alert("Tag taken!");
    }

    await updateDoc(doc(db, "users", _me.email), { name, nick, av });
    _me.name = name; _me.nick = nick; _me.av = av;
    update(); document.getElementById('settings').style.display = 'none';
  };

  document.getElementById('find').addEventListener('keypress', async (e) => {
    if(e.key === 'Enter') {
      const v = e.target.value.replace('@','').toLowerCase();
      const q = query(collection(db, "users"), where("nick", "==", v));
      const s = await getDocs(q);
      const list = document.getElementById('contacts');
      list.innerHTML = "";
      s.forEach(d => {
        if(d.id === _me.email) return;
        const u = d.data();
        const div = document.createElement('div');
        div.style = "padding:15px 25px; display:flex; align-items:center; gap:12px; cursor:pointer";
        div.innerHTML = `<img src="${u.av||''}" style="width:40px;height:40px;border-radius:50%;background:#222;object-fit:cover"><div><b>${u.name}</b><div style="font-size:10px;color:var(--t3)">@${u.nick}</div></div>`;
        div.onclick = () => openChat(u, d.id);
        list.appendChild(div);
      });
    }
  });

  function openChat(user, email) {
    if(!_me.nick) return alert("Set @user tag first!");
    _to = { ...user, email };
    document.getElementById('header').classList.remove('hidden');
    document.getElementById('input-ui').classList.remove('hidden');
    document.getElementById('c-nick').innerText = "@" + user.nick;
    if(window.innerWidth < 768) document.getElementById('side-ui').classList.add('mobile-hide');
    load();
  }

  window.backToList = () => document.getElementById('side-ui').classList.remove('mobile-hide');

  function load() {
    if(_sub) _sub();
    const id = [_me.email, _to.email].sort().join('_');
    _sub = onSnapshot(collection(db, "chats", id, "messages"), (s) => {
      const box = document.getElementById('messages'); box.innerHTML = "";
      let ms = []; s.forEach(d => ms.push(d.data()));
      ms.sort((a,b) => a.time - b.time).forEach(m => {
        const d = document.createElement('div');
        d.className = `bubble anim-msg ${m.from === _me.email ? 'me' : 'to'}`;
        d.innerText = m.text; box.appendChild(d);
      });
      box.scrollTop = box.scrollHeight;
    });
  }

  window.send = async () => {
    const t = document.getElementById('msg-t'); if(!t.value.trim()) return;
    const id = [_me.email, _to.email].sort().join('_');
    await addDoc(collection(db, "chats", id, "messages"), { from: _me.email, text: t.value, time: Date.now() });
    t.value = "";
  };
</script>
</body>
</html>
