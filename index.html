<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hate Me</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --bg: #030303; --card: #0a0a0a; --t1: #ffffff; --t3: #555; 
            --acc: #ffffff; --bd: rgba(255,255,255,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t1); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; }

        /* Авторизация */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .auth-box { width: min(90%, 350px); background: var(--card); border: 1px solid var(--bd); padding: 25px; border-radius: 24px; text-align: center; }
        input { width: 100%; padding: 16px; border-radius: 14px; border: none; background: #f0f4f8; color: #000; margin-bottom: 12px; font-size: 14px; }
        .btn-p { width: 100%; padding: 16px; border-radius: 14px; border: none; background: #fff; color: #000; font-weight: 700; cursor: pointer; }

        /* Главный экран */
        #app-screen { display: none; flex-direction: column; height: 100vh; }
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }

        /* Меню (Bottom Nav) */
        .nav-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px);
            border-top: 1px solid var(--bd); display: flex; justify-content: space-around; 
            padding: 15px 0 25px 0; z-index: 1000;
        }
        .nav-item { color: var(--t3); cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 10px; }
        .nav-item.active { color: #fff; }

        /* Профиль элементы */
        .av-big { width: 90px; height: 90px; border-radius: 50%; background: #222; margin: 0 auto 20px; border: 1px solid var(--bd); overflow: hidden; }
        .av-big img { width: 100%; height: 100%; object-fit: cover; }
        .field { background: var(--card); border: 1px solid var(--bd); padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        .label { font-size: 11px; color: var(--t3); margin-bottom: 5px; text-transform: uppercase; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="margin-bottom: 30px;">Hate Me</h1>
        <div class="auth-box">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-p" id="login-btn">Войти</button>
            <button class="btn-p" id="reg-btn" style="background:none; color:#777; font-size:13px;">Создать аккаунт</button>
        </div>
    </div>

    <div id="app-screen">
        <div class="content">
            <div id="page-chats" class="page active">
                <h2 style="margin-bottom: 20px;">Сообщения</h2>
                <div style="color: var(--t3); text-align: center; margin-top: 50px;">У вас пока нет активных чатов</div>
            </div>

            <div id="page-search" class="page">
                <h2 style="margin-bottom: 20px;">Поиск</h2>
                <input type="text" id="search-input" placeholder="Поиск по нику..." style="background: var(--card); color: #fff; border: 1px solid var(--bd);">
            </div>

            <div id="page-profile" class="page">
                <div class="av-big"><img id="my-av" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix"></div>
                <div class="field"><div class="label">Имя</div><div id="p-name">Loading...</div></div>
                <div class="field"><div class="label">Никнейм</div><div id="p-nick">@...</div></div>
                <button class="btn-p" onclick="location.reload()" style="background:rgba(255,0,0,0.1); color:#ff4d4d; margin-top: 20px;">Выйти</button>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="showPage('chats', this)"><i data-lucide="message-circle"></i>Чаты</div>
            <div class="nav-item" onclick="showPage('search', this)"><i data-lucide="search"></i>Поиск</div>
            <div class="nav-item" onclick="showPage('profile', this)"><i data-lucide="user"></i>Профиль</div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ТВОИ ДАННЫЕ ИЗ image_416f3c.png
        const firebaseConfig = {
            apiKey: "AIzaSyA-PLDvaLnzoJWTWJb17U4FJU0ziQfL0eU",
            authDomain: "hate-24365.firebaseapp.com",
            projectId: "hate-24365",
            storageBucket: "hate-24365.firebasestorage.app",
            appId: "1:990484802574:web:56e00d91e1e58df144a05f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Переключение страниц
        window.showPage = (pageId, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            el.classList.add('active');
        };

        async function handleAuth(mode) {
            const email = document.getElementById('email').value.toLowerCase().trim();
            const pass = document.getElementById('pass').value;

            if(!email || !pass) return alert("Заполни всё!");

            try {
                const userRef = doc(db, "users", email);
                const snap = await getDoc(userRef);

                if (mode === 'login') {
                    if (snap.exists() && snap.data().password === pass) {
                        startApp(snap.data());
                    } else alert("Ошибка входа!");
                } else {
                    if (snap.exists()) return alert("Аккаунт уже есть!");
                    const user = { name: "User", nick: email.split('@')[0], password: pass };
                    await setDoc(userRef, user);
                    startApp(user);
                }
            } catch (e) { alert("Ошибка Firebase! Проверь Rules."); }
        }

        function startApp(user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            document.getElementById('p-name').innerText = user.name;
            document.getElementById('p-nick').innerText = "@" + user.nick;
            lucide.createIcons();
        }

        document.getElementById('login-btn').onclick = () => handleAuth('login');
        document.getElementById('reg-btn').onclick = () => handleAuth('reg');
        lucide.createIcons();
    </script>
</body>
</html>
