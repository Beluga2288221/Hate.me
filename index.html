<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Hate Me</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root { 
    --bg: #030303; --card: #0a0a0a; --s2: #121212; --t1: #ffffff; --t3: #555; 
    --acc: #ffffff; --bd: rgba(255,255,255,0.08); --on: #00ff66; --blur: blur(25px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--t1); font-family: 'DM Sans', sans-serif; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

  #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 700; z-index: 5000; display: none; }

  #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .auth-box { width: min(90%, 380px); background: var(--card); border-radius: 30px; border: 1px solid var(--bd); overflow: hidden; }
  .auth-body { padding: 30px; }
  .input-box { width: 100%; background: #e8f0fe; border: none; padding: 16px; border-radius: 15px; color: #000; font-size: 14px; margin-bottom: 15px; }
  .btn-p { width: 100%; padding: 18px; border-radius: 15px; border: none; background: #fff; color: #000; font-weight: 700; cursor: pointer; transition: 0.2s; }
  .btn-p:disabled { opacity: 0.5; cursor: not-allowed; }

  #app-screen { display: none; width: 100%; height: 100%; flex: 1; position: relative; }
  .sidebar { width: 380px; height: 100%; background: var(--card); border-right: 1px solid var(--bd); display: flex; flex-direction: column; }
  .chat-area { flex: 1; background: var(--bg); display: flex; flex-direction: column; }

  @media (max-width: 768px) { 
    .sidebar { width: 100%; position: absolute; inset: 0; z-index: 10; } 
    .sidebar.hide { display: none; }
    .nav-bar { display: flex !important; }
  }

  .nav-bar { 
    height: 75px; background: var(--card); border-top: 1px solid var(--bd); 
    display: none; justify-content: space-around; align-items: center; 
    padding-bottom: env(safe-area-inset-bottom); z-index: 100;
  }
  .nav-item { color: var(--t3); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; cursor: pointer; }
  .nav-item.active { color: #fff; }

  .view-tab { display: none; width: 100%; height: 100%; background: var(--bg); position: absolute; inset: 0; z-index: 50; flex-direction: column; padding: 40px 20px; }
  .view-tab.active { display: flex; }

  .contact-item { padding: 18px 25px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid var(--bd); }
  .av-main { width: 45px; height: 45px; border-radius: 50%; background: #222; overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: 700; }
  .bubble { max-width: 80%; padding: 14px 18px; border-radius: 20px; font-size: 14px; margin-bottom: 6px; }
  .bubble.me { align-self: flex-end; background: #fff; color: #000; border-bottom-right-radius: 4px; }
  .bubble.to { align-self: flex-start; background: var(--s2); color: #fff; border-bottom-left-radius: 4px; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="toast"></div>

<div id="auth-screen">
  <div style="font-size: 40px; font-weight: 700; margin-bottom: 30px; letter-spacing: -2px">Hate Me</div>
  
  <div class="auth-box" id="step-1">
    <div class="auth-body">
      <h2 style="margin-bottom:20px">Вход</h2>
      <input type="email" id="auth-email" class="input-box" placeholder="Почта">
      <input type="password" id="auth-pass" class="input-box" placeholder="Пароль">
      <button class="btn-p" id="login-btn">Войти</button>
      <div style="text-align:center; margin-top:20px; font-size:12px; color:var(--t3); cursor:pointer" id="to-reg">Нет аккаунта? Регистрация</div>
    </div>
  </div>

  <div class="auth-box hidden" id="step-2">
    <div class="auth-body">
      <h2 style="margin-bottom:20px">Регистрация</h2>
      <input type="email" id="reg-email" class="input-box" placeholder="Почта">
      <input type="password" id="reg-pass" class="input-box" placeholder="Придумайте пароль">
      <button class="btn-p" id="reg-step1-btn">Далее</button>
      <div style="text-align:center; margin-top:20px; font-size:12px; color:var(--t3); cursor:pointer" id="to-login">Назад</div>
    </div>
  </div>

  <div class="auth-box hidden" id="step-3">
    <div class="auth-body">
      <h2 style="margin-bottom:20px">О себе</h2>
      <input type="text" id="reg-nick" class="input-box" placeholder="@username">
      <input type="text" id="reg-name" class="input-box" placeholder="Ваше имя">
      <button class="btn-p" id="reg-final-btn">Завершить</button>
    </div>
  </div>
</div>

<div id="app-screen">
  <aside class="sidebar" id="sidebar">
    <div id="view-chats" style="height:100%; display:flex; flex-direction:column;">
        <div style="padding:30px; display:flex; justify-content:space-between; align-items:center"><h2>Чаты</h2></div>
        <div id="contacts" style="flex:1; overflow-y:auto"></div>
    </div>
    <div id="view-search" class="view-tab">
        <h2>Поиск</h2>
        <input type="text" id="find-inp" class="input-box" placeholder="Введите @ник..." style="margin-top:20px; background:var(--s2); color:#fff">
        <div id="search-results"></div>
    </div>
    <div id="view-profile" class="view-tab">
        <h1>Профиль</h1>
        <div style="text-align:center; margin-top:40px">
            <div id="my-av" style="width:100px; height:100px; border-radius:50%; background:#222; margin:0 auto 20px;"></div>
            <h2 id="s-nick">@nick</h2>
            <button class="btn-p" id="logout-btn" style="margin-top:40px; background:rgba(255,0,0,0.1); color:#ff4d4d">Выйти</button>
        </div>
    </div>
  </aside>

  <main class="chat-area" id="chat-main">
    <div id="chat-header" class="hidden" style="padding:20px 30px; border-bottom:1px solid var(--bd); display:flex; align-items:center; gap:15px">
        <i data-lucide="chevron-left" id="close-chat-btn" style="cursor:pointer"></i>
        <div id="chat-title" style="font-weight:700">Имя</div>
    </div>
    <div id="messages" style="flex:1; overflow-y:auto; padding:30px; display:flex; flex-direction:column"></div>
    <div id="input-bar" class="hidden" style="padding:25px; display:flex; gap:15px">
        <input type="text" id="msg-input" class="input-box" placeholder="Написать..." style="margin:0; background:var(--s2); color:#fff; border-radius:20px">
        <button id="send-btn" style="background:#fff; border:none; width:55px; height:55px; border-radius:20px; cursor:pointer"><i data-lucide="send" style="color:#000"></i></button>
    </div>
  </main>
</div>

<nav class="nav-bar">
  <div class="nav-item active" id="nav-chats"><i data-lucide="message-circle"></i>Чаты</div>
  <div class="nav-item" id="nav-search"><i data-lucide="search"></i>Поиск</div>
  <div class="nav-item" id="nav-profile"><i data-lucide="user"></i>Профиль</div>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, addDoc, query, where, getDocs, orderBy, arrayUnion } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const cfg = {
    apiKey: process.env.NEXT_PUBLIC_FIREBASE_API_KEY,
    authDomain: process.env.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,
    projectId: process.env.NEXT_PUBLIC_FIREBASE_PROJECT_ID,
    storageBucket: process.env.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,
    appId: process.env.NEXT_PUBLIC_FIREBASE_APP_ID
  };

  const app = initializeApp(cfg);
  const db = getFirestore(app);
  let _me = null, _to = null, _regData = {}, lastAction = 0;

  const notify = (t) => {
    const el = document.getElementById('toast');
    el.innerText = t; el.style.display = 'block';
    setTimeout(() => el.style.display='none', 3000);
  };

  const flood = () => {
    if(Date.now() - lastAction < 1500) { notify("Не спамь"); return true; }
    lastAction = Date.now(); return false;
  };

  const showStep = (n) => {
    document.querySelectorAll('.auth-box').forEach(b => b.classList.add('hidden'));
    document.getElementById('step-' + n).classList.remove('hidden');
  };

  const start = () => {
    localStorage.setItem('hate_session', JSON.stringify({ email: _me.email }));
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    document.getElementById('s-nick').innerText = "@" + _me.nick;
    listen();
    lucide.createIcons();
  };

  document.getElementById('login-btn').onclick = async () => {
    if(flood()) return;
    const e = document.getElementById('auth-email').value.trim().toLowerCase();
    const p = document.getElementById('auth-pass').value.trim();
    if(!e || !p) return notify("Заполни всё");
    const s = await getDoc(doc(db, "users", e));
    if(s.exists() && s.data().password === p) { _me = { ...s.data(), email: e }; start(); }
    else notify("Ошибка входа");
  };

  document.getElementById('reg-step1-btn').onclick = async () => {
    if(flood()) return;
    const e = document.getElementById('reg-email').value.trim().toLowerCase();
    const p = document.getElementById('reg-pass').value.trim();
    if(!e || p.length < 6) return notify("Минимум 6 знаков");
    const s = await getDoc(doc(db, "users", e));
    if(s.exists()) return notify("Занято");
    _regData = { email: e, password: p };
    showStep(3);
  };

  document.getElementById('reg-final-btn').onclick = async () => {
    if(flood()) return;
    const n = document.getElementById('reg-name').value.trim();
    const ni = document.getElementById('reg-nick').value.trim().toLowerCase().replace('@','');
    if(!n || !ni) return notify("Заполни профиль");
    const q = query(collection(db, "users"), where("nick", "==", ni));
    const s = await getDocs(q);
    if(!s.empty) return notify("Ник занят");
    const user = { name: n, nick: ni, password: _regData.password, myChats: [], av: "", bio: "hate" };
    await setDoc(doc(db, "users", _regData.email), user);
    _me = { ...user, email: _regData.email };
    start();
  };

  document.getElementById('to-reg').onclick = () => showStep(2);
  document.getElementById('to-login').onclick = () => showStep(1);

  function listen() {
    onSnapshot(doc(db, "users", _me.email), async (snap) => {
      const list = document.getElementById('contacts'); list.innerHTML = "";
      for(let c of snap.data().myChats || []) {
        const u = (await getDoc(doc(db, "users", c.id))).data();
        if(!u) continue;
        const div = document.createElement('div');
        div.className = "contact-item";
        div.innerHTML = `<div class="av-main">${u.name[0]}</div><div><b>${u.name}</b><br><small>@${u.nick}</small></div>`;
        div.onclick = () => openChat(c.id, u);
        list.appendChild(div);
      }
    });
  }

  function openChat(id, user) {
    _to = { id, ...user };
    document.getElementById('chat-header').classList.remove('hidden');
    document.getElementById('input-bar').classList.remove('hidden');
    document.getElementById('chat-title').innerText = user.name;
    if(window.innerWidth < 768) document.getElementById('sidebar').classList.add('hide');
    const chatID = [_me.email, _to.id].sort().join('_');
    onSnapshot(query(collection(db, `chats/${chatID}/messages`), orderBy("time", "asc")), (s) => {
      const box = document.getElementById('messages'); box.innerHTML = "";
      s.forEach(d => {
        const m = d.data();
        const div = document.createElement('div');
        div.className = `bubble ${m.from === _me.email ? 'me' : 'to'}`;
        div.innerText = m.text;
        box.appendChild(div);
      });
      box.scrollTop = box.scrollHeight;
    });
  }

  document.getElementById('send-btn').onclick = async () => {
    if(flood()) return;
    const inp = document.getElementById('msg-input');
    if(!inp.value.trim()) return;
    const cid = [_me.email, _to.id].sort().join('_');
    await updateDoc(doc(db, "users", _me.email), { myChats: arrayUnion({id: _to.id}) });
    await updateDoc(doc(db, "users", _to.id), { myChats: arrayUnion({id: _me.email}) });
    await addDoc(collection(db, `chats/${cid}/messages`), { from: _me.email, text: inp.value, time: Date.now() });
    inp.value = "";
  };

  document.getElementById('find-inp').onkeypress = async (e) => {
    if(e.key === 'Enter') {
      if(flood()) return;
      const n = e.target.value.replace('@','').toLowerCase().trim();
      const q = query(collection(db, "users"), where("nick", "==", n));
      const s = await getDocs(q);
      s.forEach(d => { if(d.id !== _me.email) openChat(d.id, d.data()); });
    }
  };

  const switchTab = (id, el) => {
    document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    if(id !== 'chats') document.getElementById('view-' + id).classList.add('active');
    el.classList.add('active');
    document.getElementById('sidebar').classList.remove('hide');
  };

  document.getElementById('nav-chats').onclick = function() { switchTab('chats', this); };
  document.getElementById('nav-search').onclick = function() { switchTab('search', this); };
  document.getElementById('nav-profile').onclick = function() { switchTab('profile', this); };
  document.getElementById('close-chat-btn').onclick = () => document.getElementById('sidebar').classList.remove('hide');
  document.getElementById('logout-btn').onclick = () => { localStorage.removeItem('hate_session'); location.reload(); };

  const saved = localStorage.getItem('hate_session');
  if(saved) {
    const data = JSON.parse(saved);
    getDoc(doc(db, "users", data.email)).then(s => {
      if(s.exists()) { _me = { ...s.data(), email: data.email }; start(); }
    });
  }
</script>
</body>
</html>
