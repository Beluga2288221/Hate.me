<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Hate Me</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root { 
    --bg: #030303; --card: #0a0a0a; --s2: #121212; --t1: #ffffff; --t3: #555; 
    --acc: #ffffff; --bd: rgba(255,255,255,0.08); --on: #00ff66; --blur: blur(25px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--t1); font-family: 'DM Sans', sans-serif; height: 100dvh; overflow: hidden; display: flex; }

  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 700; z-index: 5000; display: none; }

  #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .auth-box { width: min(90%, 380px); background: var(--card); border-radius: 30px; border: 1px solid var(--bd); overflow: hidden; }
  .auth-tabs { display: flex; border-bottom: 1px solid var(--bd); }
  .tab { flex: 1; padding: 20px; text-align: center; font-size: 12px; font-weight: 700; cursor: pointer; color: var(--t3); text-transform: uppercase; }
  .tab.active { color: #fff; background: rgba(255,255,255,0.02); }
  .input-box { width: 100%; background: #e8f0fe; border: none; padding: 16px; border-radius: 15px; color: #000; font-size: 14px; margin-bottom: 15px; }
  .btn-p { width: 100%; padding: 18px; border-radius: 15px; border: none; background: #fff; color: #000; font-weight: 700; cursor: pointer; }

  #app-screen { display: none; width: 100%; height: 100%; }
  .sidebar { width: 380px; background: var(--card); border-right: 1px solid var(--bd); display: flex; flex-direction: column; z-index: 10; }
  .chat-area { flex: 1; background: var(--bg); display: flex; flex-direction: column; position: relative; }

  @media (max-width: 768px) { .sidebar { width: 100%; position: absolute; inset: 0; } .sidebar.hide { display: none; } }

  .contact-item { padding: 18px 25px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid var(--bd); }
  .contact-item:hover { background: rgba(255,255,255,0.02); }
  
  .av-main { width: 45px; height: 45px; border-radius: 50%; background: #222; overflow: hidden; object-fit: cover; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: 700; }

  .bubble { max-width: 80%; padding: 14px 18px; border-radius: 20px; font-size: 14px; margin-bottom: 6px; word-wrap: break-word; }
  .bubble.me { align-self: flex-end; background: #fff; color: #000; border-bottom-right-radius: 4px; }
  .bubble.to { align-self: flex-start; background: var(--s2); color: #fff; border-bottom-left-radius: 4px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(5,5,5,0.92); backdrop-filter: var(--blur); z-index: 4000; display: none; flex-direction: column; align-items: center; padding: 40px 20px; animation: fade 0.3s ease; overflow-y: auto; }
  .settings-container { width: min(100%, 500px); }
  .section-title { font-size: 11px; color: var(--t3); text-transform: uppercase; font-weight: 800; margin: 30px 0 15px 10px; letter-spacing: 1px; }
  .set-card { background: var(--card); padding: 20px; border-radius: 22px; border: 1px solid var(--bd); margin-bottom: 10px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
  .set-card-content { flex: 1; }
  .set-card-label { font-size: 10px; color: var(--t3); text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }

  .av-upload-box { position: relative; width: 120px; height: 120px; margin: 0 auto 20px; cursor: pointer; }
  .av-upload-box img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid var(--bd); }

  .pc-hide { display: none; }
  @media (max-width: 768px) { .pc-hide { display: block; } }
  .hidden { display: none !important; }
  .hp { opacity: 0; position: absolute; top: 0; left: 0; height: 0; width: 0; z-index: -1; }
  
  #cf-turnstile { margin: 15px 0; display: flex; justify-content: center; }
  .rate-limit-info { font-size: 11px; color: var(--t3); text-align: center; margin-top: 10px; }
</style>
</head>
<body>

<div id="toast"></div>

<div id="auth-screen">
  <div style="font-size: 40px; font-weight: 700; margin-bottom: 30px; letter-spacing: -2px">Hate Me</div>
  <div class="auth-box">
    <div class="auth-tabs">
      <div class="tab active" id="t-login" onclick="setAuth('login')">Вход</div>
      <div class="tab" id="t-reg" onclick="setAuth('reg')">Рега</div>
    </div>
    <div class="auth-body" id="auth-fields"></div>
    <input type="text" id="hp-field" class="hp" tabindex="-1" autocomplete="off">
    <input type="text" id="hp-field2" class="hp" tabindex="-1" autocomplete="off">
  </div>
</div>

<div id="app-screen">
  <aside class="sidebar" id="sidebar">
    <div style="padding:30px; display:flex; justify-content:space-between; align-items:center">
      <h2 style="letter-spacing:-1px">Чаты</h2>
      <div style="display:flex; gap:15px">
        <i data-lucide="plus-circle" onclick="toggleModal('create-modal')" style="cursor:pointer; color:var(--t3)"></i>
        <i data-lucide="settings" onclick="toggleModal('settings-panel')" style="cursor:pointer; color:var(--t3)"></i>
      </div>
    </div>
    <div style="padding:0 25px 20px"><input type="text" id="find" class="input-box" placeholder="Поиск @user..." style="background:var(--s2); color:#fff; margin:0"></div>
    <div id="contacts" style="flex:1; overflow-y:auto"></div>
  </aside>

  <main class="chat-area">
    <div id="chat-header" class="hidden" style="padding:20px 30px; border-bottom:1px solid var(--bd); display:flex; align-items:center; gap:15px">
        <i data-lucide="chevron-left" class="pc-hide" onclick="closeChatMobile()" style="cursor:pointer"></i>
        <div id="chat-av-box" class="av-main" style="width:40px; height:40px"></div>
        <div>
            <div id="chat-title" style="font-weight:700"></div>
            <div id="chat-sub" style="font-size:10px; color:var(--on)">Онлайн</div>
        </div>
    </div>
    <div id="messages" style="flex:1; overflow-y:auto; padding:30px; display:flex; flex-direction:column"></div>
    <div id="input-bar" class="hidden" style="padding:25px; display:flex; gap:15px">
        <input type="text" id="msg-input" class="input-box" placeholder="Написать..." style="background:var(--s2); color:#fff; margin:0; border-radius:20px">
        <button id="send-btn" onclick="sendMsg()" style="background:#fff; border:none; width:55px; height:55px; border-radius:20px; cursor:pointer"><i data-lucide="send" style="color:#000; width:20px"></i></button>
    </div>
  </main>
</div>

<div id="settings-panel" class="modal-overlay">
  <div class="settings-container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h1>Профиль</h1>
        <i data-lucide="x" onclick="toggleModal('settings-panel')" style="cursor:pointer"></i>
    </div>
    <div class="av-upload-box" onclick="document.getElementById('av-input').click()">
        <img id="my-av-img" src="">
        <input type="file" id="av-input" hidden accept="image/*" onchange="uploadAv(this)">
    </div>

    <div class="section-title">Аккаунт</div>
    <div class="set-card" onclick="changeField('name')"><div class="set-card-content"><div class="set-card-label">Имя</div><span id="s-name"></span></div><i data-lucide="chevron-right" style="color:var(--t3)"></i></div>
    <div class="set-card" onclick="changeField('nick')"><div class="set-card-content"><div class="set-card-label">Имя пользователя</div><span id="s-nick"></span></div><i data-lucide="chevron-right" style="color:var(--t3)"></i></div>
    <div class="set-card" style="cursor:default"><div class="set-card-content"><div class="set-card-label">Почта</div><span id="s-email"></span></div></div>
    <div class="set-card" onclick="changeField('bio')"><div class="set-card-content"><div class="set-card-label">О себе</div><span id="s-bio"></span></div><i data-lucide="chevron-right" style="color:var(--t3)"></i></div>

    <div class="section-title">Устройства</div>
    <div class="set-card" style="cursor:default; border-color: rgba(0,255,102,0.2)">
        <i data-lucide="monitor" style="color:var(--on); width:20px"></i>
        <div class="set-card-content">
            <div class="set-card-label" style="color:var(--on)">Текущий сеанс</div>
            <span id="s-device">Web Portal Stable</span>
        </div>
        <span style="font-size:9px; background:rgba(0,255,102,0.1); color:var(--on); padding:4px 8px; border-radius:8px; font-weight:700">ONLINE</span>
    </div>

    <button class="btn-p" onclick="logout()" style="margin-top:40px; background:rgba(255,0,0,0.1); color:#ff4d4d">Выйти</button>
  </div>
</div>

<div id="create-modal" class="modal-overlay">
  <div class="settings-container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h1>Создать</h1>
        <i data-lucide="x" onclick="toggleModal('create-modal')" style="cursor:pointer"></i>
    </div>
    <select id="create-type" class="input-box"><option value="group">Группа</option><option value="channel">Канал</option></select>
    <input type="text" id="create-name" class="input-box" placeholder="Название">
    <input type="text" id="create-members" class="input-box" placeholder="Участники (@user1, @user2)">
    <button class="btn-p" onclick="processCreate()">Создать</button>
  </div>
</div>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, onSnapshot, addDoc, updateDoc, arrayUnion, orderBy, serverTimestamp, runTransaction } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

  const _0xHate = ["QUl6YVN5QS1QTER2YUxuem9KV1RXSmIxN1U0RkpVMHppUWZMMGVV", "aGF0ZS0yNDM2NS5maXJlYmFzZWFwcC5jb20=", "aGF0ZS0yNDM2NQ==", "aGF0ZS0yNDM2NS5maXJlYmFzZXN0b3JhZ2UuYXBw", "MTo5OTA0ODQ4MDI1NzQ6d2ViOjU2ZTBmOTRiOGU1OGRmMTQ0YTA1Zg=="];
  const decrypt = (s) => atob(s);
  const cfg = { apiKey: decrypt(_0xHate[0]), authDomain: decrypt(_0xHate[1]), projectId: decrypt(_0xHate[2]), storageBucket: decrypt(_0xHate[3]), appId: decrypt(_0xHate[4]) };
  
  const app = initializeApp(cfg);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let _me = null, _to = null, _code = "", _mode = 'login', _sub = null, _chatsSub = null;
  let _attempts = { login: 0, msg: 0, create: 0 };
  let _blocked = false;
  let _cfToken = null;
  let _deviceId = localStorage.getItem('hate_device') || crypto.randomUUID();
  localStorage.setItem('hate_device', _deviceId);

  const getIP = async () => {
    try {
      const res = await fetch('https://api.ipify.org?format=json');
      const data = await res.json();
      return data.ip;
    } catch {
      return _deviceId;
    }
  };

  const checkRateLimit = async (type, limit, windowMs) => {
    if (_blocked) return false;
    
    const ip = await getIP();
    const key = `rl_${type}_${ip}`;
    const now = Date.now();
    
    try {
      const rlDoc = await getDoc(doc(db, "ratelimits", key));
      const data = rlDoc.exists() ? rlDoc.data() : { count: 0, reset: now + windowMs };
      
      if (now > data.reset) {
        await setDoc(doc(db, "ratelimits", key), { count: 1, reset: now + windowMs, ip: ip });
        return true;
      }
      
      if (data.count >= limit) {
        _blocked = true;
        setTimeout(() => _blocked = false, windowMs);
        notify("Слишком много запросов. Подождите.");
        return false;
      }
      
      await setDoc(doc(db, "ratelimits", key), { 
        count: data.count + 1, 
        reset: data.reset, 
        ip: ip,
        lastRequest: now 
      });
      
      return true;
    } catch {
      return false;
    }
  };

  const NVS = async (type = 'default') => {
    if (document.getElementById('hp-field').value !== "" || document.getElementById('hp-field2').value !== "") {
      await logSecurityEvent('honeypot_triggered');
      return false;
    }
    
    const limits = {
      'login': { limit: 3, window: 300000 },
      'msg': { limit: 10, window: 60000 },
      'create': { limit: 2, window: 300000 },
      'default': { limit: 5, window: 60000 }
    };
    
    const cfg = limits[type] || limits['default'];
    return await checkRateLimit(type, cfg.limit, cfg.window);
  };

  const logSecurityEvent = async (event) => {
    try {
      await addDoc(collection(db, "security_logs"), {
        event: event,
        device: _deviceId,
        timestamp: serverTimestamp(),
        userAgent: navigator.userAgent,
        url: window.location.href
      });
    } catch {}
  };

  // ФИКС: Проверяем загрузку turnstile перед использованием
  const waitForTurnstile = () => {
    return new Promise((resolve) => {
      if (typeof turnstile !== 'undefined') {
        resolve();
        return;
      }
      const check = () => {
        if (typeof turnstile !== 'undefined') {
          resolve();
        } else {
          setTimeout(check, 100);
        }
      };
      check();
    });
  };

  const notify = (t) => { 
    const el = document.getElementById('toast'); 
    el.textContent = t; 
    el.style.display = 'block'; 
    setTimeout(() => el.style.display='none', 3000); 
  };
  
  const updateIcons = () => lucide.createIcons();

  window.onload = async () => {
    const saved = localStorage.getItem('hate_session');
    if(saved) {
      try {
        const data = JSON.parse(saved);
        const s = await getDoc(doc(db, "users", data.email));
        if(s.exists()) { 
          _me = { ...s.data(), email: data.email }; 
          await signInAnonymously(auth);
          enterApp(); 
        }
      } catch(e) { 
        localStorage.removeItem('hate_session'); 
      }
    }
  };

  window.setAuth = (m) => { 
    _mode = m; 
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.id === 't-'+m)); 
    renderAuth(); 
  };
  
  // ФИКС: Асинхронная инициализация turnstile
  async function renderAuth(step = 1) {
    const box = document.getElementById('auth-fields');
    if(_mode === 'login') {
      box.innerHTML = `
        <div style="padding:25px">
          <input type="email" id="l-email" class="input-box" placeholder="Email" autocomplete="email">
          <input type="password" id="l-pass" class="input-box" placeholder="Пароль" autocomplete="current-password">
          <div id="cf-turnstile"></div>
          <button class="btn-p" id="login-btn" onclick="doLogin()">Войти</button>
          <div class="rate-limit-info">3 попытки входа за 5 минут</div>
        </div>`;
    } else {
      if(step === 1) {
        box.innerHTML = `
          <div style="padding:25px">
            <input type="email" id="r-email" class="input-box" placeholder="Email" autocomplete="email">
            <div id="cf-turnstile"></div>
            <button class="btn-p" id="reg-btn" onclick="sendCode()">Получить код</button>
          </div>`;
      } else if(step === 2) {
        box.innerHTML = `
          <div style="padding:25px">
            <input type="text" id="r-code" class="input-box" style="text-align:center" placeholder="Код из письма" maxlength="6" inputmode="numeric">
            <button class="btn-p" onclick="verify()">Подтвердить</button>
          </div>`;
      } else {
        box.innerHTML = `
          <div style="padding:25px">
            <input type="password" id="r-pass" class="input-box" placeholder="Придумайте пароль" minlength="8">
            <button class="btn-p" onclick="finishReg()">Завершить регистрацию</button>
          </div>`;
      }
    }
    
    // ФИКС: Ждем загрузки turnstile перед рендером
    if (step === 1) {
      await waitForTurnstile();
      turnstile.render('#cf-turnstile', {
        sitekey: '0x4AAAAAAACw4qReGkxeJAVln', // ЗАМЕНИ НА СВОЙ
        callback: (token) => { _cfToken = token; },
        'error-callback': () => { notify('Ошибка капчи'); }
      });
    }
    
    updateIcons();
  }
  renderAuth();

  const clean = (str) => str.replace(/[<>\"']/g, "").trim();

  window.sendCode = async () => {
    if(!await NVS('login')) return;
    if (!_cfToken) { notify('Пройдите проверку'); return; }
    
    const email = clean(document.getElementById('r-email').value);
    if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
      notify("Некорректный email");
      return;
    }
    
    _code = crypto.randomUUID().substring(0, 8).toUpperCase();
    
    try {
      await fetch('https://server-roan-omega.vercel.app/send-code', { 
        method: 'POST', 
        headers: {'Content-Type': 'application/json'}, 
        body: JSON.stringify({ email, code: _code, cf: _cfToken }) 
      });
      renderAuth(2);
    } catch(e) { 
      notify("Ошибка сервера"); 
      await logSecurityEvent('email_send_failed');
    }
  };

  window.verify = () => { 
    const input = document.getElementById('r-code').value.toUpperCase();
    if(input === _code) renderAuth(3); 
    else {
      notify("Неверный код");
      _attempts.login++;
    }
  };

  window.finishReg = async () => {
    if(!await NVS('login')) return;
    
    const email = clean(document.getElementById('r-email').value);
    const pass = document.getElementById('r-pass').value;
    
    if (pass.length < 8) {
      notify("Пароль минимум 8 символов");
      return;
    }
    
    const user = { 
      name: "User", 
      nick: "", 
      bio: "hate hate hate...", 
      password: await hashPass(pass), 
      myChats: [], 
      av: "", 
      devices: [_deviceId], 
      created: serverTimestamp(),
      lastLogin: serverTimestamp()
    };
    
    await setDoc(doc(db, "users", email), user);
    _me = { ...user, email }; 
    await signInAnonymously(auth);
    enterApp();
  };

  // ФИКС ВХОДА — поддержка старых и новых паролей
  window.doLogin = async () => {
    if(!await NVS('login')) return;
    if (!_cfToken) { notify('Пройдите проверку'); return; }
    
    const m = clean(document.getElementById('l-email').value);
    const p = document.getElementById('l-pass').value;
    
    const s = await getDoc(doc(db, "users", m));
    if(s.exists()) {
      const userData = s.data();
      const hashed = await hashPass(p);
      
      // Новый формат (хеш SHA-256)
      if(userData.password === hashed) { 
        _me = { ...userData, email: m };
        await updateDoc(doc(db, "users", m), { lastLogin: serverTimestamp() });
        await signInAnonymously(auth);
        enterApp();
        return;
      }
      
      // Старый формат (plaintext) — мигрируем на хеш
      if(userData.password === p) {
        await updateDoc(doc(db, "users", m), { 
          password: hashed,
          lastLogin: serverTimestamp()
        });
        _me = { ...userData, email: m, password: hashed };
        await signInAnonymously(auth);
        enterApp();
        return;
      }
    }
    
    notify("Неверный email или пароль");
    _attempts.login++;
    
    if (_attempts.login >= 3) {
      await logSecurityEvent('brute_force_attempt');
    }
  };

  async function hashPass(pass) {
    const encoder = new TextEncoder();
    const data = encoder.encode(pass + "hate_salt_2024");
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function enterApp() {
    localStorage.setItem('hate_session', JSON.stringify({ email: _me.email, time: Date.now(), device: _deviceId }));
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    updateInfo(); 
    listenMyChats();
  }

  function updateInfo() {
    document.getElementById('s-name').textContent = _me.name || "User";
    document.getElementById('s-nick').textContent = _me.nick ? "@" + _me.nick : "не задан";
    document.getElementById('s-email').textContent = _me.email;
    document.getElementById('s-bio').textContent = _me.bio || "О себе";
    const dev = window.innerWidth < 768 ? "Mobile App Interface" : "Desktop Web Portal";
    document.getElementById('s-device').textContent = dev;
    if(_me.av) document.getElementById('my-av-img').src = _me.av;
    updateIcons();
  }

  window.uploadAv = async (input) => {
    if(!await NVS('default')) return;
    
    const file = input.files[0]; 
    if(!file) return;
    
    if(file.size > 500000) {
      notify("Файл слишком велик (макс 500KB)");
      return;
    }
    
    if(!file.type.startsWith('image/')) {
      notify("Только изображения");
      return;
    }
    
    const reader = new FileReader();
    reader.onloadend = async () => {
      const img = new Image(); 
      img.src = reader.result;
      img.onload = async () => {
        const canvas = document.createElement('canvas');
        canvas.width = 200; 
        canvas.height = 200;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, 200, 200);
        const data = canvas.toDataURL('image/jpeg', 0.6);
        await updateDoc(doc(db, "users", _me.email), { av: data });
        _me.av = data; 
        updateInfo();
      };
    };
    reader.readAsDataURL(file);
  };

  window.toggleModal = (id) => { 
    const m = document.getElementById(id); 
    m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; 
  };

  window.changeField = async (t) => {
    if(!await NVS('default')) return;
    
    let val = prompt("Введите значение:"); 
    if(!val) return;
    
    val = clean(val);
    if (val.length > 100) {
      notify("Слишком длинно");
      return;
    }
    
    let up = {}; 
    if(t === 'name') up.name = val; 
    else if(t === 'nick') up.nick = val.replace('@','').toLowerCase(); 
    else if(t === 'bio') up.bio = val;
    
    await updateDoc(doc(db, "users", _me.email), up); 
    Object.assign(_me, up); 
    updateInfo();
  };

  window.processCreate = async () => {
    if(!await NVS('create')) return;
    
    const type = document.getElementById('create-type').value;
    const name = clean(document.getElementById('create-name').value);
    
    if(!name || name.length < 2) {
      notify("Название минимум 2 символа");
      return;
    }
    
    const docRef = await addDoc(collection(db, "groups"), { 
      name, 
      type, 
      creator: _me.email, 
      participants: [_me.email], 
      created: serverTimestamp(),
      device: _deviceId
    });
    
    await updateDoc(doc(db, "users", _me.email), { 
      myChats: arrayUnion({ id: docRef.id, type: 'group' }) 
    });
    
    toggleModal('create-modal');
  };

  function listenMyChats() {
    if(_chatsSub) _chatsSub();
    
    _chatsSub = onSnapshot(doc(db, "users", _me.email), async (snap) => {
      const list = document.getElementById('contacts'); 
      list.innerHTML = "";
      const myChats = snap.data().myChats || [];
      
      for(let item of myChats) {
        const s = await getDoc(doc(db, item.type === 'group' ? "groups" : "users", item.id));
        if(!s.exists()) continue;
        
        const d = s.data();
        const div = document.createElement('div'); 
        div.className = "contact-item";
        
        const av = d.av 
          ? `<img src="${d.av}" class="av-main">` 
          : `<div class="av-main" style="background:#222">${clean(d.name?.[0] || 'U')}</div>`;
          
        div.innerHTML = `${av}<div><b class="nick-render"></b><div style="font-size:11px;color:var(--t3)" class="sub-render"></div></div>`;
        div.querySelector('.nick-render').textContent = d.name || "Unknown";
        div.querySelector('.sub-render').textContent = item.type === 'group' 
          ? (d.type === 'group' ? 'Группа' : 'Канал') 
          : "@" + d.nick;
          
        div.onclick = () => openChat(item); 
        list.appendChild(div);
      }
    });
  }

  window.openChat = async (item) => {
    _to = item;
    const s = await getDoc(doc(db, item.type === 'group' ? "groups" : "users", item.id));
    const d = s.data();
    
    document.getElementById('chat-header').classList.remove('hidden');
    document.getElementById('input-bar').classList.remove('hidden');
    document.getElementById('chat-title').textContent = d.name || "Unknown";
    document.getElementById('chat-av-box').innerHTML = d.av 
      ? `<img src="${d.av}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">` 
      : clean(d.name?.[0] || 'U');
      
    if(item.type === 'group' && d.type === 'channel' && d.creator !== _me.email) {
      document.getElementById('input-bar').classList.add('hidden');
    }
    
    if(window.innerWidth <= 768) {
      document.getElementById('sidebar').classList.add('hide');
    }
    
    loadMsgs();
  };

  function loadMsgs() {
    if(_sub) _sub();
    
    const path = _to.type === 'group' 
      ? `groups/${_to.id}/messages` 
      : `chats/${[_me.email, _to.id].sort().join('_')}/messages`;
      
    _sub = onSnapshot(
      query(collection(db, path), orderBy("time", "asc")), 
      (s) => {
        const box = document.getElementById('messages'); 
        box.innerHTML = "";
        s.forEach(d => {
          const m = d.data(); 
          const div = document.createElement('div');
          div.className = `bubble ${m.from === _me.email ? 'me' : 'to'}`;
          div.textContent = m.text; 
          box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
      }
    );
  }

  window.sendMsg = async () => {
    if(!await NVS('msg')) return;
    
    const inp = document.getElementById('msg-input');
    const val = clean(inp.value); 
    if(!val || val.length > 500) {
      notify("Сообщение слишком длинное");
      return;
    }
    
    const path = _to.type === 'group' 
      ? `groups/${_to.id}/messages` 
      : `chats/${[_me.email, _to.id].sort().join('_')}/messages`;
      
    if(_to.type !== 'group') {
      await updateDoc(doc(db, "users", _me.email), { 
        myChats: arrayUnion({ id: _to.id, type: 'direct' }) 
      });
      await updateDoc(doc(db, "users", _to.id), { 
        myChats: arrayUnion({ id: _me.email, type: 'direct' }) 
      });
    }
    
    await addDoc(collection(db, path), { 
      from: _me.email, 
      text: val, 
      time: serverTimestamp(),
      device: _deviceId
    });
    
    inp.value = "";
  };

  document.getElementById('find').addEventListener('keypress', async (e) => {
    if(e.key === 'Enter') {
      const v = clean(e.target.value.replace('@','').toLowerCase());
      const q = query(collection(db, "users"), where("nick", "==", v));
      const s = await getDocs(q);
      s.forEach(d => { 
        if(d.id !== _me.email) openChat({ id: d.id, type: 'direct' }); 
      });
    }
  });

  window.closeChatMobile = () => document.getElementById('sidebar').classList.remove('hide');
  
  window.logout = () => { 
    localStorage.removeItem('hate_session'); 
    location.reload(); 
  };
</script>
</body>
</html>
