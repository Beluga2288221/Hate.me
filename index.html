<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Hate Me</title>

<script src="https://smtpjs.com/v3/smtp.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0a; --s1: #111; --s2: #181818;
    --t1: #f0f0f0; --t3: #666; --acc: #ffffff;
    --bd: rgba(255,255,255,0.08); --err: #ff4d4d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
  body { background: var(--bg); color: var(--t1); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; }

  /* --- АНИМАЦИИ --- */
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .anim-fade { animation: fadeIn 0.6s ease; }
  .anim-slide { animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }

  /* --- ЛОГО --- */
  .logo-container { margin-bottom: 40px; display: flex; flex-direction: column; align-items: center; animation: scaleIn 0.8s ease; }
  .logo-main { display: flex; flex-direction: column; line-height: 0.8; font-weight: 700; font-size: 72px; letter-spacing: -4px; }
  .logo-main .hate { color: var(--t3); }
  .logo-main .me { color: #fff; margin-left: 55px; }

  /* --- АВТОРИЗАЦИЯ --- */
  #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: 0.8s; }
  .auth-card { width: 100%; max-width: 400px; background: var(--s1); border: 1px solid var(--bd); border-radius: 32px; overflow: hidden; }
  .auth-nav { display: flex; border-bottom: 1px solid var(--bd); }
  .auth-nav button { flex: 1; padding: 22px; background: none; border: none; color: var(--t3); font-weight: 700; cursor: pointer; }
  .auth-nav button.active { color: #fff; background: rgba(255,255,255,0.03); }
  .auth-body { padding: 40px; min-height: 320px; }
  .auth-step { display: none; }
  .auth-step.active { display: block; animation: slideUp 0.4s ease forwards; }

  /* --- ПРИЛОЖЕНИЕ --- */
  #app-screen { display: none; height: 100vh; width: 100%; opacity: 0; transform: scale(1.1); transition: 0.8s; }
  #app-screen.visible { display: flex; opacity: 1; transform: scale(1); }
  
  .sidebar { width: 350px; background: var(--s1); border-right: 1px solid var(--bd); display: flex; flex-direction: column; }
  .btn-main { width: 100%; padding: 18px; border-radius: 16px; border: none; background: var(--acc); color: #000; font-weight: 700; cursor: pointer; transition: 0.3s; }
  .btn-main:hover { transform: translateY(-3px); }

  /* Настройки */
  #settings-modal { position: absolute; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; padding: 30px; }
  #settings-modal.active { display: flex; }
  .input-group { margin-bottom: 22px; }
  .input-group label { display: block; font-size: 10px; color: var(--t3); text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }
  .input-group input, .input-group textarea { width: 100%; background: var(--s2); border: 1px solid var(--bd); padding: 15px; border-radius: 16px; color: #fff; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="logo-container">
    <div class="logo-main"><span class="hate">Hate</span><span class="me">Me</span></div>
  </div>
  <div class="auth-card anim-slide">
    <div class="auth-nav">
        <button id="tab-login" class="active" onclick="switchAuth('login')">ВХОД</button>
        <button id="tab-reg" onclick="switchAuth('reg')">РЕГИСТРАЦИЯ</button>
    </div>
    <div class="auth-body">
        <div id="step-login" class="auth-step active">
            <div class="input-group"><label>Email</label><input type="email" id="l-email" placeholder="mail@hate.me"></div>
            <div class="input-group"><label>Пароль</label><input type="password" id="l-pass" placeholder="••••••••"></div>
            <button class="btn-main" onclick="loginUser()">Войти</button>
        </div>
        <div id="step-reg-1" class="auth-step">
            <div class="input-group"><label>Электронная почта</label><input type="email" id="r-email" placeholder="email@example.com"></div>
            <button class="btn-main" onclick="sendCode()">Получить код</button>
        </div>
        <div id="step-reg-2" class="auth-step">
            <div class="input-group"><label>Код из письма</label><input type="text" id="r-code" maxlength="6" placeholder="000 000" style="text-align:center; letter-spacing:5px; font-size:20px;"></div>
            <button class="btn-main" onclick="verifyCode()">Подтвердить</button>
        </div>
        <div id="step-reg-3" class="auth-step">
            <div class="input-group"><label>Придумайте пароль</label><input type="password" id="r-pass" placeholder="••••••••"></div>
            <button class="btn-main" onclick="registerUser()">Создать аккаунт</button>
        </div>
    </div>
  </div>
</div>

<div id="app-screen">
  <aside class="sidebar">
    <div style="padding: 30px 25px; display: flex; justify-content: space-between; align-items: center;">
        <div style="font-weight:700; font-size:22px; letter-spacing:-1px;">Hate Me</div>
        <button onclick="toggleSettings(true)" style="background:none; border:none; color:var(--t3); cursor:pointer;"><i data-lucide="settings"></i></button>
    </div>
    <div id="chatList" style="flex:1;"></div>
    <div class="prof-box" style="padding:20px; border-top:1px solid var(--bd); display:flex; align-items:center; gap:12px;">
        <div id="ui-nick" style="font-weight:700;">@username</div>
    </div>
  </aside>
  <main style="flex:1; display:flex; align-items:center; justify-content:center;">
    <div id="settings-modal">
        <button onclick="toggleSettings(false)" style="color:#fff; background:none; border:none; margin-bottom:20px; cursor:pointer;">Назад</button>
        <div class="input-group"><label>Никнейм</label><input type="text" id="set-user"></div>
        <button class="btn-main" onclick="saveData()">Сохранить</button>
    </div>
    <div style="color:var(--t3);">Выберите чат</div>
  </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  // Используем твои настройки из Weed Help
  const firebaseConfig = {
    apiKey: "AIzaSyCVcSmwPF6XPup8L9AO-mmP3qQpXGO697w",
    authDomain: "weed-messenger-8200e.firebaseapp.com",
    projectId: "weed-messenger-8200e",
    storageBucket: "weed-messenger-8200e.firebasestorage.app",
    messagingSenderId: "165427827145",
    appId: "1:165427827145:web:a9fac6fec1b87f226e1818"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let tempGeneratedCode = "";
  let currentUserEmail = "";

  lucide.createIcons();

  window.switchAuth = (t) => {
    document.getElementById('tab-login').classList.toggle('active', t==='login');
    document.getElementById('tab-reg').classList.toggle('active', t==='reg');
    document.querySelectorAll('.auth-step').forEach(s => s.classList.remove('active'));
    document.getElementById(t==='login' ? 'step-login' : 'step-reg-1').classList.add('active');
  };

  window.sendCode = function() {
    const email = document.getElementById('r-email').value;
    if(!email.includes('@')) return alert("Email!");
    
    tempGeneratedCode = Math.floor(100000 + Math.random() * 900000).toString();
    console.log("DEBUG CODE:", tempGeneratedCode);
    
    document.querySelectorAll('.auth-step').forEach(s => s.classList.remove('active'));
    document.getElementById('step-reg-2').classList.add('active');

    // Исправленный блок отправки (защита от Email is not defined)
    if (window.Email) {
        Email.send({
            Host : "smtp.gmail.com",
            Username : "weed.help.com@gmail.com",
            Password : "kgls dioz pxwk mtha", // Твой последний пароль приложения
            To : email,
            From : "weed.help.com@gmail.com",
            Subject : "Hate Me Code",
            Body : "Твой код: " + tempGeneratedCode
        });
    }
  };

  window.verifyCode = () => {
    if(document.getElementById('r-code').value.trim() === tempGeneratedCode) {
        document.querySelectorAll('.auth-step').forEach(s => s.classList.remove('active'));
        document.getElementById('step-reg-3').classList.add('active');
    } else alert("Bad code");
  };

  window.registerUser = async () => {
    const email = document.getElementById('r-email').value;
    const pass = document.getElementById('r-pass').value;
    const hateID = Math.floor(Math.random() * 1000000000);

    await setDoc(doc(db, "users", email), {
        nick: email.split('@')[0],
        id: hateID,
        password: pass
    });
    currentUserEmail = email;
    showApp(email.split('@')[0], hateID);
  };

  window.loginUser = async () => {
    const email = document.getElementById('l-email').value;
    const pass = document.getElementById('l-pass').value;
    const snap = await getDoc(doc(db, "users", email));
    
    if(snap.exists() && snap.data().password === pass) {
        currentUserEmail = email;
        showApp(snap.data().nick, snap.data().id);
    } else alert("Ошибка!");
  };

  function showApp(nick, id) {
    document.getElementById('ui-nick').innerText = "@" + nick;
    document.getElementById('auth-screen').style.display = 'none';
    const appS = document.getElementById('app-screen');
    appS.style.display = 'flex';
    setTimeout(() => appS.classList.add('visible'), 50);
  }

  window.toggleSettings = (s) => document.getElementById('settings-modal').classList.toggle('active', s);
  
  window.saveData = async () => {
    const nick = document.getElementById('set-user').value;
    await setDoc(doc(db, "users", currentUserEmail), { nick }, { merge: true });
    document.getElementById('ui-nick').innerText = "@" + nick;
    toggleSettings(false);
  };
</script>
</body>
</html>
