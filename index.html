<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Hate Me</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root { --bg: #050505; --s1: #0f0f0f; --s2: #161616; --t1: #f0f0f0; --t3: #555; --acc: #ffffff; --bd: rgba(255,255,255,0.06); --on: #00ff66; }
  * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--t1); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; }

  /* --- ЭФФЕКТНЫЕ АНИМАЦИИ --- */
  @keyframes entrance { from { opacity: 0; transform: scale(1.05); filter: blur(10px); } to { opacity: 1; transform: scale(1); filter: blur(0); } }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes msgPop { from { transform: scale(0.9) translateY(10px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
  @keyframes glow { 0% { box-shadow: 0 0 5px rgba(255,255,255,0); } 50% { box-shadow: 0 0 15px rgba(255,255,255,0.1); } 100% { box-shadow: 0 0 5px rgba(255,255,255,0); } }

  .anim-enter { animation: entrance 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
  .anim-msg { animation: msgPop 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }
  .anim-slide { animation: slideIn 0.4s ease forwards; }

  /* --- LAYOUT --- */
  #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; transition: 0.8s cubic-bezier(0.7, 0, 0.3, 1); }
  .auth-card { width: 360px; background: rgba(15,15,15,0.8); backdrop-filter: blur(20px); padding: 40px; border-radius: 40px; border: 1px solid var(--bd); }
  
  #app-screen { display: none; width: 100%; height: 100vh; opacity: 0; transform: scale(0.95); transition: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
  #app-screen.show { display: flex; opacity: 1; transform: scale(1); }

  .sidebar { width: 320px; border-right: 1px solid var(--bd); background: var(--s1); display: flex; flex-direction: column; }
  .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; background: #080808; }

  /* --- UI ELEMENTS --- */
  .input-box { background: var(--s2); border: 1px solid var(--bd); padding: 16px; border-radius: 20px; color: #fff; width: 100%; transition: 0.3s; }
  .input-box:focus { border-color: #555; background: #1a1a1a; }
  
  .btn-p { background: var(--acc); color: #000; font-weight: 700; padding: 18px; border-radius: 20px; border: none; cursor: pointer; transition: 0.3s; width: 100%; }
  .btn-p:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
  .btn-p:active { transform: scale(0.98); }

  .contact-item { padding: 15px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; border-radius: 20px; margin: 0 10px; }
  .contact-item:hover { background: rgba(255,255,255,0.03); }
  
  .messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; }
  .bubble { max-width: 75%; padding: 14px 18px; border-radius: 22px; font-size: 14px; position: relative; }
  .bubble.me { align-self: flex-end; background: var(--acc); color: #000; border-bottom-right-radius: 4px; }
  .bubble.to { align-self: flex-start; background: var(--s2); color: #fff; border-bottom-left-radius: 4px; }

  .status-on { width: 8px; height: 8px; background: var(--on); border-radius: 50%; display: inline-block; box-shadow: 0 0 8px var(--on); }

  #settings { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); z-index: 3000; display: none; align-items: center; justify-content: center; }
  
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card anim-enter">
    <h1 style="font-size:32px; letter-spacing:-2px; margin-bottom:30px; text-align:center">Hate Me</h1>
    <div id="auth-box">
      <input type="email" id="email" class="input-box" placeholder="Email" style="margin-bottom:12px">
      <input type="password" id="pass" class="input-box" placeholder="Password" style="margin-bottom:25px">
      <button class="btn-p" onclick="login()">Connect</button>
      <div style="text-align:center; margin-top:20px; font-size:12px; color:var(--t3); cursor:pointer" onclick="reg()">No account? Create</div>
    </div>
  </div>
</div>

<div id="app-screen">
  <aside class="sidebar">
    <div style="padding:30px 25px; display:flex; justify-content:space-between; align-items:center">
      <h2 style="letter-spacing:-1px">Chats</h2>
      <i data-lucide="settings" style="cursor:pointer; color:var(--t3)" onclick="openSet()"></i>
    </div>
    <div style="padding:0 20px 20px"><input type="text" id="find" class="input-box" placeholder="Search @user..." style="padding:12px 16px; border-radius:15px"></div>
    <div id="contacts" style="flex:1"></div>
    <div style="padding:20px; border-top:1px solid var(--bd); display:flex; align-items:center; gap:12px">
      <div style="width:40px; height:40px; border-radius:50%; background:#222; display:flex; align-items:center; justify-content:center"><i data-lucide="user"></i></div>
      <div style="flex:1"><div id="u-nick" style="font-weight:700; font-size:14px">@user</div><div id="u-id" style="font-size:10px; color:var(--t3)">ID: 0</div></div>
    </div>
  </aside>

  <main class="chat-area">
    <div id="header" style="padding:15px 25px; border-bottom:1px solid var(--bd); display:flex; align-items:center; gap:12px" class="hidden">
      <div id="c-av" style="width:38px; height:38px; border-radius:50%; background:#222"></div>
      <div><div id="c-nick" style="font-weight:700">@nick</div><div id="c-status" style="font-size:10px; color:var(--t3)">offline</div></div>
    </div>
    <div id="messages" class="messages"></div>
    <div id="input-ui" style="padding:20px; display:flex; gap:12px" class="hidden">
      <input type="text" id="msg-t" class="input-box" placeholder="Write a message..." style="border-radius:18px">
      <button onclick="send()" style="background:var(--acc); border:none; width:52px; height:52px; border-radius:18px; cursor:pointer; display:flex; align-items:center; justify-content:center"><i data-lucide="send" style="color:#000; width:20px"></i></button>
    </div>
  </main>
</div>

<div id="settings">
  <div class="auth-card anim-enter">
    <h2 style="margin-bottom:25px">Profile</h2>
    <div style="display:flex; flex-direction:column; gap:15px">
      <input type="text" id="set-n" class="input-box" placeholder="@username">
      <textarea id="set-a" class="input-box" placeholder="About you" rows="3"></textarea>
      <input type="text" id="set-v" class="input-box" placeholder="Avatar URL">
      <div id="set-err" style="color:var(--err); font-size:11px"></div>
      <button class="btn-p" onclick="saveSet()">Save Changes</button>
      <button style="background:none; border:none; color:#fff; cursor:pointer; font-size:13px" onclick="closeSet()">Cancel</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, onSnapshot, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const cfg = { apiKey: "AIzaSyA-PLDvaLnzoJWTWJb17U4FJU0ziQfL0eU", authDomain: "hate-24365.firebaseapp.com", projectId: "hate-24365", storageBucket: "hate-24365.firebasestorage.app", appId: "1:990484802574:web:56e00d91e1e58df144a05f" };
  const app = initializeApp(cfg);
  const db = getFirestore(app);
  let _me = null, _to = null, _sub = null;

  lucide.createIcons();

  window.login = async () => {
    const m = document.getElementById('email').value, p = document.getElementById('pass').value;
    const s = await getDoc(doc(db, "users", m));
    if(s.exists() && s.data().password === p) {
      _me = { ...s.data(), email: m };
      document.getElementById('auth-screen').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('auth-screen').classList.add('hidden');
        const appUi = document.getElementById('app-screen');
        appUi.classList.add('show');
        startApp();
      }, 600);
    }
  };

  function startApp() {
    document.getElementById('u-nick').innerText = "@" + _me.nick;
    document.getElementById('u-id').innerText = "ID: " + _me.id;
    updateDoc(doc(db, "users", _me.email), { status: 'online' });
  }

  window.openSet = () => {
    document.getElementById('set-n').value = _me.nick || "";
    document.getElementById('set-a').value = _me.about || "";
    document.getElementById('set-v').value = _me.av || "";
    document.getElementById('settings').style.display = 'flex';
  };
  window.closeSet = () => document.getElementById('settings').style.display = 'none';

  window.saveSet = async () => {
    const n = document.getElementById('set-n').value.trim(), a = document.getElementById('set-a').value, v = document.getElementById('set-v').value;
    if(n.length < 5) return alert("Min 5 chars");
    const qy = query(collection(db, "users"), where("nick", "==", n));
    const snap = await getDocs(qy);
    if(!snap.empty && n !== _me.nick) return alert("Taken");
    await updateDoc(doc(db, "users", _me.email), { nick: n, about: a, av: v });
    _me.nick = n; closeSet();
    document.getElementById('u-nick').innerText = "@" + n;
  };

  document.getElementById('find').addEventListener('keypress', async (e) => {
    if(e.key === 'Enter') {
      const v = e.target.value.replace('@','');
      const qy = query(collection(db, "users"), where("nick", "==", v));
      const s = await getDocs(qy);
      const list = document.getElementById('contacts');
      list.innerHTML = "";
      s.forEach(d => {
        const u = d.data();
        const div = document.createElement('div');
        div.className = 'contact-item anim-slide';
        div.innerHTML = `<img src="${u.av || ''}" style="width:42px;height:42px;border-radius:50%;background:#222;object-fit:cover"><div><b>@${u.nick}</b><div style="font-size:10px;color:var(--t3)">${u.status||'offline'}</div></div>`;
        div.onclick = () => openChat(u, d.id);
        list.appendChild(div);
      });
    }
  });

  function openChat(user, email) {
    if(!_me.nick || _me.nick.length < 5) return alert("Set @user first!");
    _to = { ...user, email: email };
    document.getElementById('header').classList.remove('hidden');
    document.getElementById('input-ui').classList.remove('hidden');
    document.getElementById('c-nick').innerText = "@" + user.nick;
    document.getElementById('c-status').innerText = user.status || 'offline';
    loadMsgs();
  }

  function loadMsgs() {
    if(_sub) _sub();
    const id = [_me.email, _to.email].sort().join('_');
    _sub = onSnapshot(collection(db, "chats", id, "messages"), (s) => {
      const box = document.getElementById('messages');
      box.innerHTML = "";
      let ms = []; s.forEach(d => ms.push(d.data()));
      ms.sort((a,b) => a.time - b.time).forEach(m => {
        const d = document.createElement('div');
        d.className = `bubble anim-msg ${m.from === _me.email ? 'me' : 'to'}`;
        d.innerText = m.text;
        box.appendChild(d);
      });
      box.scrollTop = box.scrollHeight;
    });
  }

  window.send = async () => {
    const t = document.getElementById('msg-t');
    if(!t.value.trim()) return;
    const id = [_me.email, _to.email].sort().join('_');
    await addDoc(collection(db, "chats", id, "messages"), { from: _me.email, text: t.value, time: Date.now() });
    t.value = "";
  };

  window.addEventListener('beforeunload', () => updateDoc(doc(db, "users", _me.email), { status: 'offline' }));
</script>
</body>
</html>
