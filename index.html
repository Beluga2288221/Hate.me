<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Hate Me</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0a; --s1: #111; --s2: #181818;
    --t1: #f0f0f0; --t3: #666; --acc: #ffffff;
    --bd: rgba(255,255,255,0.08); --err: #ff4d4d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
  body { background: var(--bg); color: var(--t1); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; }

  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .auth-card { width: 100%; max-width: 400px; background: var(--s1); border: 1px solid var(--bd); border-radius: 32px; overflow: hidden; }
  .auth-nav { display: flex; border-bottom: 1px solid var(--bd); }
  .auth-nav button { flex: 1; padding: 22px; background: none; border: none; color: var(--t3); font-weight: 700; cursor: pointer; }
  .auth-nav button.active { color: #fff; background: rgba(255,255,255,0.03); }
  .auth-body { padding: 40px; min-height: 320px; }
  .auth-step { display: none; }
  .auth-step.active { display: block; animation: slideUp 0.4s ease forwards; }

  .input-group { margin-bottom: 20px; position: relative; }
  .input-group label { display: block; font-size: 10px; color: var(--t3); text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }
  .input-group input { width: 100%; background: var(--s2); border: 1px solid var(--bd); padding: 15px; border-radius: 16px; color: #fff; }
  
  /* Красная надпись об ошибке */
  .error-msg { color: var(--err); font-size: 11px; margin-top: 8px; display: none; animation: slideUp 0.3s ease; }

  .btn-main { width: 100%; padding: 18px; border-radius: 16px; border: none; background: var(--acc); color: #000; font-weight: 700; cursor: pointer; transition: 0.3s; }
  .btn-main:disabled { background: #222; color: #555; cursor: not-allowed; }

  #app-screen { display: none; height: 100vh; width: 100%; }
  .sidebar { width: 350px; background: var(--s1); border-right: 1px solid var(--bd); display: flex; flex-direction: column; }
</style>
</head>
<body>

<div id="auth-screen">
  <div style="margin-bottom: 40px; text-align: center;">
    <div style="font-size: 48px; font-weight: 700; letter-spacing: -2px;">Hate <span style="color:var(--t3)">Me</span></div>
  </div>
  
  <div class="auth-card">
    <div class="auth-nav">
        <button id="tab-login" class="active" onclick="switchAuth('login')">ВХОД</button>
        <button id="tab-reg" onclick="switchAuth('reg')">РЕГИСТРАЦИЯ</button>
    </div>
    <div class="auth-body">
        <div id="step-login" class="auth-step active">
            <div class="input-group"><label>Email</label><input type="email" id="l-email" placeholder="mail@hate.me"></div>
            <div class="input-group"><label>Пароль</label><input type="password" id="l-pass" placeholder="••••••••"></div>
            <button class="btn-main" onclick="loginUser()">Войти</button>
        </div>
        
        <div id="step-reg-1" class="auth-step">
            <div class="input-group">
                <label>Электронная почта</label>
                <input type="email" id="r-email" placeholder="email@example.com">
                <div id="email-error" class="error-msg">Эта почта уже зарегистрирована</div>
            </div>
            <button class="btn-main" id="btn-get-code" onclick="sendCode()">Получить код</button>
        </div>

        <div id="step-reg-2" class="auth-step">
            <div class="input-group"><label>Код подтверждения</label><input type="text" id="r-code" maxlength="6" style="text-align:center; letter-spacing:5px;"></div>
            <button class="btn-main" onclick="verifyCode()">Подтвердить</button>
        </div>

        <div id="step-reg-3" class="auth-step">
            <div class="input-group"><label>Придумайте пароль</label><input type="password" id="r-pass" placeholder="минимум 6 знаков"></div>
            <button class="btn-main" onclick="registerUser()">Создать аккаунт</button>
        </div>
    </div>
  </div>
</div>

<div id="app-screen">
  <aside class="sidebar"><div style="padding: 30px; font-weight:700;">Hate Me</div><div id="ui-nick" style="padding:20px;"></div></aside>
  <main style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--t3);">Выберите чат</main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCVcSmwPF6XPup8L9AO-mmP3qQpXGO697w",
    authDomain: "weed-messenger-8200e.firebaseapp.com",
    projectId: "weed-messenger-8200e",
    storageBucket: "weed-messenger-8200e.firebasestorage.app",
    messagingSenderId: "165427827145",
    appId: "1:165427827145:web:a9fac6fec1b87f226e1818"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let tempCode = "";
  let isCooldown = false;

  window.switchAuth = (t) => {
    document.getElementById('tab-login').classList.toggle('active', t==='login');
    document.getElementById('tab-reg').classList.toggle('active', t==='reg');
    document.querySelectorAll('.auth-step').forEach(s => s.classList.remove('active'));
    document.getElementById(t==='login' ? 'step-login' : 'step-reg-1').classList.add('active');
  };

  window.sendCode = async function() {
    const email = document.getElementById('r-email').value.trim();
    const btn = document.getElementById('btn-get-code');
    const err = document.getElementById('email-error');
    
    err.style.display = 'none'; // Скрываем старую ошибку
    if(!email || !email.includes('@')) return alert("Введите почту!");
    if(isCooldown) return;

    // 1. Проверка в Firebase
    const snap = await getDoc(doc(db, "users", email));
    if(snap.exists()) {
        err.style.display = 'block'; // Показываем красную надпись
        return;
    }

    // 2. Генерация кода
    tempCode = Math.floor(100000 + Math.random() * 900000).toString();
    console.log("CODE:", tempCode);

    // 3. Таймер на 30 сек
    isCooldown = true;
    btn.disabled = true;
    let time = 30;
    const timer = setInterval(() => {
        time--;
        btn.innerText = `Повтор через ${time}с`;
        if(time <= 0) {
            clearInterval(timer);
            isCooldown = false;
            btn.disabled = false;
            btn.innerText = "Получить код";
        }
    }, 1000);

    // 4. Переход к вводу кода
    document.querySelectorAll('.auth-step').forEach(s => s.classList.remove('active'));
    document.getElementById('step-reg-2').classList.add('active');

    // 5. Отправка на сервер (ВАЖНО: замени IP на свой или используй ngrok)
    try {
        await fetch('http://127.0.0.1:5000/send-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, code: tempCode })
        });
    } catch (e) {
        console.log("Сервер недоступен, но код в консоли:", tempCode);
    }
  };

  window.verifyCode = () => {
    if(document.getElementById('r-code').value.trim() === tempCode) {
        document.querySelectorAll('.auth-step').forEach(s => s.classList.remove('active'));
        document.getElementById('step-reg-3').classList.add('active');
    } else alert("Неверный код!");
  };

  window.registerUser = async () => {
    const email = document.getElementById('r-email').value;
    const pass = document.getElementById('r-pass').value;
    if(pass.length < 6) return alert("Пароль от 6 знаков!");
    
    const id = Math.floor(100000 + Math.random() * 900000);
    await setDoc(doc(db, "users", email), { nick: email.split('@')[0], id, password: pass });
    location.reload();
  };

  window.loginUser = async () => {
    const email = document.getElementById('l-email').value;
    const pass = document.getElementById('l-pass').value;
    const snap = await getDoc(doc(db, "users", email));
    if(snap.exists() && snap.data().password === pass) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        document.getElementById('ui-nick').innerText = "@" + snap.data().nick;
    } else alert("Ошибка!");
  };
</script>
</body>
</html>
