<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Hate Me</title>

<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>

<style>
  :root {
    --bg: #0a0a0a; --s1: #111; --s2: #181818;
    --t1: #f0f0f0; --t3: #666; --acc: #ffffff;
    --bd: rgba(255,255,255,0.08); --err: #ff4d4d; /* Добавили цвет ошибки */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
  body { background: var(--bg); color: var(--t1); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; }

  /* АНИМАЦИИ */
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .anim-fade { animation: fadeIn 0.6s ease; }
  .anim-slide { animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }

  /* ЛОГО */
  .logo-container { margin-bottom: 40px; display: flex; flex-direction: column; align-items: center; animation: scaleIn 0.8s ease; }
  .logo-main { display: flex; flex-direction: column; line-height: 0.8; font-weight: 700; font-size: 72px; letter-spacing: -4px; }
  .logo-main .hate { color: var(--t3); }
  .logo-main .me { color: #fff; margin-left: 55px; }

  /* АВТОРИЗАЦИЯ */
  #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: 0.8s; }
  .auth-card { width: 100%; max-width: 400px; background: var(--s1); border: 1px solid var(--bd); border-radius: 32px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
  .auth-nav { display: flex; border-bottom: 1px solid var(--bd); }
  .auth-nav button { flex: 1; padding: 22px; background: none; border: none; color: var(--t3); font-weight: 700; cursor: pointer; }
  .auth-nav button.active { color: #fff; background: rgba(255,255,255,0.03); }
  .auth-body { padding: 40px; min-height: 320px; }
  .auth-step { display: none; }
  .auth-step.active { display: block; animation: slideUp 0.4s ease forwards; }

  /* ПРИЛОЖЕНИЕ */
  #app-screen { display: none; height: 100vh; width: 100%; opacity: 0; transform: scale(1.1); transition: 0.8s; }
  #app-screen.visible { display: flex; opacity: 1; transform: scale(1); }
  .sidebar { width: 350px; background: var(--s1); border-right: 1px solid var(--bd); display: flex; flex-direction: column; }
  
  .input-group { margin-bottom: 22px; }
  .input-group label { display: block; font-size: 10px; color: var(--t3); text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }
  .input-group input { width: 100%; background: var(--s2); border: 1px solid var(--bd); padding: 15px; border-radius: 16px; color: #fff; font-size: 14px; }
  
  /* СТИЛЬ ОШИБКИ */
  .auth-error { color: var(--err); font-size: 11px; margin-top: -15px; margin-bottom: 15px; display: none; font-weight: 500; animation: fadeIn 0.3s ease; }

  .btn-main { width: 100%; padding: 18px; border-radius: 16px; border: none; background: var(--acc); color: #000; font-weight: 700; cursor: pointer; transition: 0.3s; }
  .btn-main:hover:not(:disabled) { transform: translateY(-3px); opacity: 0.9; }
  .btn-main:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }

  .prof-box { padding: 20px; border-top: 1px solid var(--bd); background: #0c0c0c; display: flex; align-items: center; gap: 12px; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="logo-container">
    <div class="logo-main"><span class="hate">Hate</span><span class="me">Me</span></div>
  </div>
  <div class="auth-card anim-slide">
    <div class="auth-nav">
        <button id="tab-login" class="active" onclick="switchAuth('login')">ВХОД</button>
        <button id="tab-reg" onclick="switchAuth('reg')">РЕГИСТРАЦИЯ</button>
    </div>
    <div class="auth-body">
        <div id="step-login" class="auth-step active">
            <div class="input-group"><label>Email</label><input type="email" id="l-email" placeholder="mail@hate.me"></div>
            <div class="input-group"><label>Пароль</label><input type="password" id="l-pass" placeholder="••••••••"></div>
            <button class="btn-main" onclick="loginUser()">Войти</button>
        </div>
        <div id="step-reg-1" class="auth-step">
            <div class="input-group"><label>Электронная почта</label><input type="email" id="r-email" placeholder="email@example.com"></div>
            <div id="reg-error" class="auth-error">Эта почта уже зарегистрирована</div>
            <button class="btn-main" id="btn-get-code" onclick="sendCode()">Получить код</button>
        </div>
        <div id="step-reg-2" class="auth-step">
            <div class="input-group"><label>Код из письма</label><input type="text" id="r-code" maxlength="6" placeholder="000000" style="text-align:center; letter-spacing:8px; font-size:20px;"></div>
            <button class="btn-main" onclick="verifyCode()">Подтвердить</button>
        </div>
        <div id="step-reg-3" class="auth-step">
            <div class="input-group"><label>Придумайте пароль</label><input type="password" id="r-pass" placeholder="••••••••"></div>
            <button class="btn-main" onclick="registerUser()">Создать аккаунт</button>
        </div>
    </div>
  </div>
</div>

<div id="app-screen">
  <aside class="sidebar">
    <div style="padding: 30px 25px;"><h3>Hate Me</h3></div>
    <div style="flex:1"></div>
    <div class="prof-box">
        <div id="av-stub" style="width:44px; height:44px; border-radius:14px; background:#222; display:flex; align-items:center; justify-content:center;"><i data-lucide="user"></i></div>
        <div style="flex:1">
            <div id="ui-nick" style="font-weight:700; font-size:14px;">@username</div>
            <div id="ui-id" style="color:var(--t3); font-size:10px;">Hate ID: 0000000000</div>
        </div>
    </div>
  </aside>
  <main style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--t3);">Выберите чат</main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-PLDvaLnzoJWTWJb17U4FJU0ziQfL0eU",
    authDomain: "hate-24365.firebaseapp.com",
    projectId: "hate-24365",
    storageBucket: "hate-24365.firebasestorage.app",
    appId: "1:990484802574:web:56e00d91e1e58df144a05f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  
  let tempGeneratedCode = "";
  let canSend = true;

  lucide.createIcons();

  window.switchAuth = (t) => {
    document.getElementById('tab-login').classList.toggle('active', t==='login');
    document.getElementById('tab-reg').classList.toggle('active', t==='reg');
    document.querySelectorAll('.auth-step').forEach(s => s.classList.remove('active'));
    document.getElementById(t==='login' ? 'step-login' : 'step-reg-1').classList.add('active');
  };

  window.nextStep = (n) => {
    document.querySelectorAll('.auth-step').forEach(s => s.classList.remove('active'));
    document.getElementById('step-reg-'+n).classList.add('active');
  };

  // ОБНОВЛЕННАЯ ФУНКЦИЯ: Сначала проверяет Firebase
  window.sendCode = async function() {
    if (!canSend) return;

    const email = document.getElementById('r-email').value;
    if(!email.includes('@')) return alert("Введите корректный Email!");
    
    const errorBlock = document.getElementById('reg-error');
    const btn = document.getElementById('btn-get-code');

    // ШАГ 1: Проверяем, есть ли такой email в базе
    try {
        const snap = await getDoc(doc(db, "users", email));
        if (snap.exists()) {
            // Email ЗАHЯТ: Показываем ошибку и выходим
            errorBlock.style.display = 'block';
            return;
        } else {
            // Email СВОБОДЕH: Прячем ошибку и идем дальше
            errorBlock.style.display = 'none';
        }
    } catch (e) {
        console.error(e);
        alert("Ошибка Firebase при проверке!");
        return;
    }

    // ШАГ 2: Если email свободен, отправляем код (как раньше)
    canSend = false;
    tempGeneratedCode = Math.floor(100000 + Math.random() * 900000).toString();

    let timeLeft = 30;
    btn.disabled = true;
    const timerInterval = setInterval(() => {
        btn.innerText = `Повтор через ${timeLeft}s`;
        timeLeft--;
        if (timeLeft < 0) {
            clearInterval(timerInterval);
            canSend = true;
            btn.disabled = false;
            btn.innerText = "Получить код";
        }
    }, 1000);

    try {
        const response = await fetch('http://localhost:5000/send-code', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email: email, code: tempGeneratedCode })
        });
        if(response.ok) {
            nextStep(2);
        } else {
            alert("Ошибка сервера Python");
        }
    } catch(e) {
        alert("Запусти сервер Python (server.py)!");
        // В случае ошибки сервера, сбрасываем таймер
        clearInterval(timerInterval);
        canSend = true;
        btn.disabled = false;
        btn.innerText = "Получить код";
    }
  };

  window.verifyCode = () => {
    const userInp = document.getElementById('r-code').value.trim();
    if(String(userInp) === String(tempGeneratedCode)) {
        nextStep(3);
    } else {
        alert("Неверный код!");
    }
  };

  window.registerUser = async () => {
    const email = document.getElementById('r-email').value;
    const pass = document.getElementById('r-pass').value;
    const id = Math.floor(Math.random() * 9000000000);
    await setDoc(doc(db, "users", email), { nick: email.split('@')[0], password: pass, id: id });
    showApp(email.split('@')[0], id);
  };

  window.loginUser = async () => {
    const email = document.getElementById('l-email').value;
    const pass = document.getElementById('l-pass').value;
    const snap = await getDoc(doc(db, "users", email));
    if(snap.exists() && snap.data().password === pass) {
        showApp(snap.data().nick, snap.data().id);
    } else alert("Ошибка входа!");
  };

  function showApp(nick, id) {
    document.getElementById('ui-nick').innerText = "@" + nick;
    document.getElementById('ui-id').innerText = "Hate ID: " + id;
    const auth = document.getElementById('auth-screen');
    const appS = document.getElementById('app-screen');
    auth.style.opacity = '0';
    setTimeout(() => {
        auth.style.display = 'none';
        appS.style.display = 'flex';
        setTimeout(() => appS.classList.add('visible'), 50);
        lucide.createIcons();
    }, 600);
  }
</script>
</body>
</html>
