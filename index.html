<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Hate Me</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root { 
    --bg: #0e1621; --card: #17212b; --s2: #242f3d; --t1: #ffffff; --t3: #708499; 
    --acc: #50a2e9; --bd: rgba(255,255,255,0.05); --on: #64b5ef; --blur: blur(20px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--t1); font-family: 'DM Sans', sans-serif; height: 100dvh; overflow: hidden; display: flex; }

  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 700; z-index: 5000; display: none; }

  /* AUTH */
  #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .auth-box { width: min(90%, 380px); background: var(--card); border-radius: 20px; border: 1px solid var(--bd); overflow: hidden; }
  .auth-tabs { display: flex; border-bottom: 1px solid var(--bd); }
  .tab { flex: 1; padding: 20px; text-align: center; font-size: 13px; font-weight: 700; cursor: pointer; color: var(--t3); }
  .tab.active { color: var(--acc); background: rgba(80,162,233,0.05); }
  .input-box { width: 100%; background: var(--s2); border: 1px solid var(--bd); padding: 14px; border-radius: 12px; color: #fff; font-size: 15px; margin-bottom: 12px; }
  .btn-p { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--acc); color: #fff; font-weight: 700; cursor: pointer; }

  /* APP */
  #app-screen { display: none; width: 100%; height: 100%; }
  .sidebar { width: 380px; background: var(--card); border-right: 1px solid #000; display: flex; flex-direction: column; z-index: 10; }
  .chat-area { flex: 1; background: #0e1117; display: flex; flex-direction: column; position: relative; }

  @media (max-width: 768px) { .sidebar { width: 100%; position: absolute; inset: 0; } .sidebar.hide { display: none; } }

  .contact-item { padding: 12px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.1); }
  .contact-item:hover { background: var(--s2); }
  
  .av-main { width: 50px; height: 50px; border-radius: 50%; background: #2b3948; overflow: hidden; object-fit: cover; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }

  .bubble { max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 15px; margin-bottom: 4px; }
  .bubble.me { align-self: flex-end; background: #2b5278; color: #fff; border-bottom-right-radius: 4px; }
  .bubble.to { align-self: flex-start; background: var(--card); color: #fff; border-bottom-left-radius: 4px; }

  /* FULL SETTINGS (RESTORED) */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: var(--blur); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; animation: fade 0.2s ease; }
  .settings-container { width: min(100%, 420px); background: var(--bg); border-radius: 15px; overflow: hidden; position: relative; }
  .set-header { padding: 20px; display: flex; align-items: center; gap: 20px; background: var(--card); }
  .set-body { padding: 0; background: var(--bg); }
  .set-row { padding: 15px 20px; display: flex; align-items: center; gap: 25px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.2); transition: 0.2s; }
  .set-row:hover { background: var(--s2); }
  .set-row i { color: var(--t3); width: 22px; }
  .set-info { display: flex; flex-direction: column; }
  .set-val { font-size: 15px; color: var(--acc); }
  .set-label { font-size: 13px; color: var(--t3); }
  
  .bio-box { padding: 20px; font-size: 15px; color: #fff; line-height: 1.4; border-bottom: 8px solid #000; }

  .pc-hide { display: none; }
  @media (max-width: 768px) { .pc-hide { display: block; } }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="toast"></div>

<div id="auth-screen">
  <div style="font-size: 32px; font-weight: 700; margin-bottom: 25px;">Hate Me</div>
  <div class="auth-box">
    <div class="auth-tabs">
      <div class="tab active" id="t-login" onclick="setAuth('login')">Вход</div>
      <div class="tab" id="t-reg" onclick="setAuth('reg')">Регистрация</div>
    </div>
    <div class="auth-body" style="padding: 25px;" id="auth-fields"></div>
  </div>
</div>

<div id="app-screen">
  <aside class="sidebar" id="sidebar">
    <div style="padding:20px; display:flex; justify-content:space-between; align-items:center">
        <i data-lucide="menu" style="color:var(--t3)"></i>
        <input type="text" id="find" placeholder="Поиск" style="flex:1; margin:0 15px; background:#1e2c3a; border:none; padding:8px 15px; border-radius:20px; color:#fff">
        <i data-lucide="settings" onclick="toggleModal('settings-panel')" style="cursor:pointer; color:var(--t3)"></i>
    </div>
    <div id="contacts" style="flex:1; overflow-y:auto"></div>
  </aside>

  <main class="chat-area">
    <div id="chat-header" class="hidden" style="padding:10px 20px; background:var(--card); display:flex; align-items:center; gap:15px">
        <i data-lucide="arrow-left" class="pc-hide" onclick="closeChatMobile()" style="cursor:pointer"></i>
        <div id="chat-av-box" class="av-main" style="width:40px; height:40px"></div>
        <div style="flex:1">
            <div id="chat-title" style="font-weight:700; font-size:16px">Имя</div>
            <div id="chat-sub" style="font-size:13px; color:var(--on)">в сети</div>
        </div>
        <i data-lucide="more-vertical" style="color:var(--t3)"></i>
    </div>
    <div id="messages" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column"></div>
    <div id="input-bar" class="hidden" style="padding:15px; display:flex; gap:10px; background:var(--bg)">
        <i data-lucide="paperclip" style="color:var(--t3); margin-top:10px"></i>
        <input type="text" id="msg-input" placeholder="Написать сообщение..." style="flex:1; background:transparent; border:none; color:#fff; font-size:16px">
        <i data-lucide="smile" style="color:var(--t3); margin-top:10px"></i>
        <button onclick="sendMsg()" style="background:transparent; border:none; cursor:pointer"><i data-lucide="send" style="color:var(--acc)"></i></button>
    </div>
  </main>
</div>

<div id="settings-panel" class="modal-overlay">
  <div class="settings-container">
    <div class="set-header">
        <i data-lucide="arrow-left" onclick="toggleModal('settings-panel')" style="cursor:pointer"></i>
        <div style="font-size:18px; font-weight:700">Информация</div>
        <div style="flex:1; text-align:right"><i data-lucide="camera" style="cursor:pointer" onclick="document.getElementById('av-input').click()"></i></div>
    </div>
    
    <div style="padding:20px; display:flex; align-items:center; gap:20px; background:var(--card)">
        <div class="av-upload-box" style="width:70px; height:70px; margin:0">
            <img id="my-av-img" src="" style="width:70px; height:70px; border-radius:50%; object-fit:cover">
            <input type="file" id="av-input" hidden accept="image/*" onchange="uploadAv(this)">
        </div>
        <div>
            <div id="s-full-name" style="font-size:20px; font-weight:700">User</div>
            <div style="font-size:14px; color:var(--t3)">в сети</div>
        </div>
    </div>

    <div class="set-body">
        <div class="bio-box" id="s-bio" onclick="changeField('bio')">Напишите что-нибудь о себе...</div>
        
        <div class="set-row" onclick="changeField('phone')">
            <i data-lucide="phone"></i>
            <div class="set-info">
                <span class="set-val" id="s-phone">+000 00 000 00 00</span>
                <span class="set-label">Номер телефона</span>
            </div>
        </div>
        
        <div class="set-row" onclick="changeField('nick')">
            <i data-lucide="at-sign"></i>
            <div class="set-info">
                <span class="set-val" id="s-nick">@username</span>
                <span class="set-label">Имя пользователя</span>
            </div>
        </div>

        <div class="set-row" onclick="changeField('name')">
            <i data-lucide="user"></i>
            <div class="set-info">
                <span class="set-val" id="s-name-disp">User</span>
                <span class="set-label">Имя</span>
            </div>
        </div>

        <div class="set-row" onclick="logout()" style="color:#ff595a">
            <i data-lucide="log-out" style="color:#ff595a"></i>
            <span>Выйти</span>
        </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, onSnapshot, addDoc, updateDoc, arrayUnion, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const cfg = { apiKey: "AIzaSyA-PLDvaLnzoJWTWJb17U4FJU0ziQfL0eU", authDomain: "hate-24365.firebaseapp.com", projectId: "hate-24365", storageBucket: "hate-24365.firebasestorage.app", appId: "1:990484802574:web:56e00d91e1e58df144a05f" };
  const app = initializeApp(cfg);
  const db = getFirestore(app);

  let _me = null, _to = null, _code = "", _mode = 'login', _sub = null, _chatsSub = null;
  const notify = (t) => { const el = document.getElementById('toast'); el.innerText = t; el.style.display = 'block'; setTimeout(() => el.style.display='none', 3000); };
  const updateIcons = () => lucide.createIcons();

  window.onload = async () => {
    const saved = localStorage.getItem('hate_session');
    if(saved) {
        const data = JSON.parse(saved);
        const s = await getDoc(doc(db, "users", data.email));
        if(s.exists()) { _me = { ...s.data(), email: data.email }; enterApp(); }
    }
  };

  window.setAuth = (m) => { _mode = m; document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.id === 't-'+m)); renderAuth(); };
  
  function renderAuth(step = 1) {
    const box = document.getElementById('auth-fields');
    if(_mode === 'login') box.innerHTML = `<input type="email" id="l-email" class="input-box" placeholder="Email"><input type="password" id="l-pass" class="input-box" placeholder="Пароль"><button class="btn-p" onclick="doLogin()">Войти</button>`;
    else {
      if(step === 1) box.innerHTML = `<input type="email" id="r-email" class="input-box" placeholder="Email"><button class="btn-p" onclick="sendCode()">Продолжить</button>`;
      else if(step === 2) box.innerHTML = `<input type="text" id="r-code" class="input-box" style="text-align:center" placeholder="Код из письма"><button class="btn-p" onclick="verify()">Ок</button>`;
      else box.innerHTML = `<input type="password" id="r-pass" class="input-box" placeholder="Придумайте пароль"><button class="btn-p" onclick="finishReg()">Завершить</button>`;
    }
  }
  renderAuth();

  window.sendCode = async () => {
    const email = document.getElementById('r-email').value;
    _code = Math.floor(100000 + Math.random() * 900000).toString();
    await fetch('https://server-roan-omega.vercel.app/send-code', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ email, code: _code }) });
    renderAuth(2);
  };
  window.verify = () => { if(document.getElementById('r-code').value === _code) renderAuth(3); };
  
  window.finishReg = async () => {
    const email = document.getElementById('r-email').value, pass = document.getElementById('r-pass').value;
    const user = { name: "User", nick: "", phone: "Не указан", bio: "Hate hate hate...", password: pass, myChats: [], av: "" };
    await setDoc(doc(db, "users", email), user);
    _me = { ...user, email }; enterApp();
  };

  window.doLogin = async () => {
    const m = document.getElementById('l-email').value, p = document.getElementById('l-pass').value;
    const s = await getDoc(doc(db, "users", m));
    if(s.exists() && s.data().password === p) { _me = { ...s.data(), email: m }; enterApp(); } else notify("Ошибка входа");
  };

  function enterApp() {
    localStorage.setItem('hate_session', JSON.stringify({ email: _me.email, time: Date.now() }));
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    updateInfo();
    listenMyChats();
  }

  function updateInfo() {
    document.getElementById('s-full-name').innerText = _me.name;
    document.getElementById('s-name-disp').innerText = _me.name;
    document.getElementById('s-nick').innerText = _me.nick ? "@" + _me.nick : "не задан";
    document.getElementById('s-phone').innerText = _me.phone || "Не указан";
    document.getElementById('s-bio').innerText = _me.bio || "О себе...";
    if(_me.av) document.getElementById('my-av-img').src = _me.av;
    updateIcons();
  }

  window.uploadAv = (input) => {
    const file = input.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onloadend = async () => {
        const img = new Image(); img.src = reader.result;
        img.onload = async () => {
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            canvas.width = 150; canvas.height = 150; ctx.drawImage(img, 0, 0, 150, 150);
            const compressed = canvas.toDataURL('image/jpeg', 0.6);
            await updateDoc(doc(db, "users", _me.email), { av: compressed });
            _me.av = compressed; updateInfo();
        };
    };
    reader.readAsDataURL(file);
  };

  window.toggleModal = (id) => { const m = document.getElementById(id); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; };

  window.changeField = async (t) => {
    let val = prompt("Введите новое значение:"); 
    if(val === null) return;
    let up = {}; 
    if(t === 'name') up.name = val;
    else if(t === 'nick') up.nick = val.replace('@','').toLowerCase();
    else if(t === 'phone') up.phone = val;
    else if(t === 'bio') up.bio = val;

    await updateDoc(doc(db, "users", _me.email), up);
    Object.assign(_me, up); 
    updateInfo();
  };

  function listenMyChats() {
    if(_chatsSub) _chatsSub();
    _chatsSub = onSnapshot(doc(db, "users", _me.email), async (snap) => {
        const list = document.getElementById('contacts');
        list.innerHTML = "";
        const myChats = snap.data().myChats || [];
        for(let item of myChats) {
            const uDoc = await getDoc(doc(db, "users", item.id));
            if(!uDoc.exists()) continue;
            const u = uDoc.data();
            const div = document.createElement('div');
            div.className = "contact-item";
            const av = u.av ? `<img src="${u.av}" class="av-main">` : `<div class="av-main">${u.name[0]}</div>`;
            div.innerHTML = `${av}<div style="flex:1"><div style="display:flex;justify-content:space-between"><b>${u.name}</b><span style="font-size:12px;color:var(--t3)">18:12</span></div><div style="font-size:13px;color:var(--t3)">@${u.nick}</div></div>`;
            div.onclick = () => openChat({ id: item.id, type: 'direct' });
            list.appendChild(div);
        }
    });
  }

  window.openChat = async (item) => {
    _to = item;
    const header = document.getElementById('chat-header');
    header.classList.remove('hidden');
    document.getElementById('input-bar').classList.remove('hidden');
    const uDoc = await getDoc(doc(db, "users", item.id));
    const u = uDoc.data();
    document.getElementById('chat-title').innerText = u.name;
    document.getElementById('chat-av-box').innerHTML = u.av ? `<img src="${u.av}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">` : u.name[0];
    if(window.innerWidth <= 768) document.getElementById('sidebar').classList.add('hide');
    loadMsgs();
  };

  function loadMsgs() {
    if(_sub) _sub();
    const id = [_me.email, _to.id].sort().join('_');
    _sub = onSnapshot(query(collection(db, `chats/${id}/messages`), orderBy("time", "asc")), (s) => {
        const box = document.getElementById('messages'); box.innerHTML = "";
        s.forEach(d => {
            const m = d.data();
            const div = document.createElement('div');
            div.className = `bubble ${m.from === _me.email ? 'me' : 'to'}`;
            div.innerText = m.text;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
  }

  window.sendMsg = async () => {
    const inp = document.getElementById('msg-input'); if(!inp.value.trim()) return;
    const id = [_me.email, _to.id].sort().join('_');
    await updateDoc(doc(db, "users", _me.email), { myChats: arrayUnion({ id: _to.id, type: 'direct' }) });
    await updateDoc(doc(db, "users", _to.id), { myChats: arrayUnion({ id: _me.email, type: 'direct' }) });
    await addDoc(collection(db, `chats/${id}/messages`), { from: _me.email, text: inp.value, time: Date.now() });
    inp.value = "";
  };

  document.getElementById('find').addEventListener('keypress', async (e) => {
    if(e.key === 'Enter') {
      const v = e.target.value.replace('@','').toLowerCase().trim();
      const q = query(collection(db, "users"), where("nick", "==", v));
      const s = await getDocs(q);
      s.forEach(d => { if(d.id !== _me.email) openChat({ id: d.id, type: 'direct' }); });
    }
  });

  window.closeChatMobile = () => document.getElementById('sidebar').classList.remove('hide');
  window.logout = () => { localStorage.removeItem('hate_session'); location.reload(); };
</script>
</body>
</html>
