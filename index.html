<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Hate Me</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root { 
    --bg: #030303; --card: #0a0a0a; --s2: #121212; --t1: #ffffff; --t3: #555; 
    --acc: #ffffff; --bd: rgba(255,255,255,0.08); --on: #00ff66; --blur: blur(25px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--t1); font-family: 'DM Sans', sans-serif; height: 100dvh; overflow: hidden; display: flex; }

  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 700; z-index: 5000; display: none; }

  /* AUTH */
  #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .auth-box { width: min(90%, 380px); background: var(--card); border-radius: 30px; border: 1px solid var(--bd); overflow: hidden; }
  .auth-tabs { display: flex; border-bottom: 1px solid var(--bd); }
  .tab { flex: 1; padding: 20px; text-align: center; font-size: 12px; font-weight: 700; cursor: pointer; color: var(--t3); text-transform: uppercase; }
  .tab.active { color: #fff; background: rgba(255,255,255,0.02); }
  .input-box { width: 100%; background: #e8f0fe; border: none; padding: 16px; border-radius: 15px; color: #000; font-size: 14px; margin-bottom: 15px; }
  .btn-p { width: 100%; padding: 18px; border-radius: 15px; border: none; background: #fff; color: #000; font-weight: 700; cursor: pointer; }

  /* APP */
  #app-screen { display: none; width: 100%; height: 100%; }
  .sidebar { width: 380px; background: var(--card); border-right: 1px solid var(--bd); display: flex; flex-direction: column; z-index: 10; }
  .chat-area { flex: 1; background: var(--bg); display: flex; flex-direction: column; position: relative; }

  @media (max-width: 768px) { .sidebar { width: 100%; position: absolute; inset: 0; } .sidebar.hide { display: none; } }

  .contact-item { padding: 18px 25px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid var(--bd); }
  .contact-item:hover { background: rgba(255,255,255,0.02); }
  
  .av-main { width: 45px; height: 45px; border-radius: 50%; background: #222; overflow: hidden; object-fit: cover; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: 700; }

  .bubble { max-width: 80%; padding: 14px 18px; border-radius: 20px; font-size: 14px; margin-bottom: 6px; }
  .bubble.me { align-self: flex-end; background: #fff; color: #000; border-bottom-right-radius: 4px; }
  .bubble.to { align-self: flex-start; background: var(--s2); color: #fff; border-bottom-left-radius: 4px; }

  /* SETTINGS PANEL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(5,5,5,0.92); backdrop-filter: var(--blur); z-index: 4000; display: none; flex-direction: column; align-items: center; padding: 40px 20px; animation: fade 0.3s ease; overflow-y: auto; }
  .settings-container { width: min(100%, 500px); }
  .section-title { font-size: 11px; color: var(--t3); text-transform: uppercase; font-weight: 800; margin: 30px 0 15px 10px; letter-spacing: 1px; }
  .set-card { background: var(--card); padding: 20px; border-radius: 22px; border: 1px solid var(--bd); margin-bottom: 10px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
  .set-card-content { flex: 1; }
  .set-card-label { font-size: 10px; color: var(--t3); text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }

  .av-upload-box { position: relative; width: 120px; height: 120px; margin: 0 auto 20px; cursor: pointer; }
  .av-upload-box img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid var(--bd); }

  .pc-hide { display: none; }
  @media (max-width: 768px) { .pc-hide { display: block; } }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="toast"></div>

<div id="auth-screen">
  <div style="font-size: 40px; font-weight: 700; margin-bottom: 30px; letter-spacing: -2px">Hate Me</div>
  <div class="auth-box">
    <div class="auth-tabs">
      <div class="tab active" id="t-login" onclick="setAuth('login')">Вход</div>
      <div class="tab" id="t-reg" onclick="setAuth('reg')">Рега</div>
    </div>
    <div class="auth-body" id="auth-fields"></div>
  </div>
</div>

<div id="app-screen">
  <aside class="sidebar" id="sidebar">
    <div style="padding:30px; display:flex; justify-content:space-between; align-items:center">
      <h2 style="letter-spacing:-1px">Чаты</h2>
      <div style="display:flex; gap:15px">
        <i data-lucide="plus-circle" onclick="toggleModal('create-modal')" style="cursor:pointer; color:var(--t3)"></i>
        <i data-lucide="settings" onclick="toggleModal('settings-panel')" style="cursor:pointer; color:var(--t3)"></i>
      </div>
    </div>
    <div style="padding:0 25px 20px"><input type="text" id="find" class="input-box" placeholder="Поиск @user..." style="background:var(--s2); color:#fff; margin:0"></div>
    <div id="contacts" style="flex:1; overflow-y:auto"></div>
  </aside>

  <main class="chat-area">
    <div id="chat-header" class="hidden" style="padding:20px 30px; border-bottom:1px solid var(--bd); display:flex; align-items:center; gap:15px">
        <i data-lucide="chevron-left" class="pc-hide" onclick="closeChatMobile()" style="cursor:pointer"></i>
        <div id="chat-av-box" class="av-main" style="width:40px; height:40px"></div>
        <div>
            <div id="chat-title" style="font-weight:700">Имя</div>
            <div id="chat-sub" style="font-size:10px; color:var(--on)">Онлайн</div>
        </div>
    </div>
    <div id="messages" style="flex:1; overflow-y:auto; padding:30px; display:flex; flex-direction:column"></div>
    <div id="input-bar" class="hidden" style="padding:25px; display:flex; gap:15px">
        <input type="text" id="msg-input" class="input-box" placeholder="Написать..." style="background:var(--s2); color:#fff; margin:0; border-radius:20px">
        <button onclick="sendMsg()" style="background:#fff; border:none; width:55px; height:55px; border-radius:20px; cursor:pointer"><i data-lucide="send" style="color:#000; width:20px"></i></button>
    </div>
  </main>
</div>

<div id="settings-panel" class="modal-overlay">
  <div class="settings-container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h1>Профиль</h1>
        <i data-lucide="x" onclick="toggleModal('settings-panel')" style="cursor:pointer"></i>
    </div>
    <div class="av-upload-box" onclick="document.getElementById('av-input').click()">
        <img id="my-av-img" src="">
        <input type="file" id="av-input" hidden accept="image/*" onchange="uploadAv(this)">
    </div>

    <div class="section-title">Аккаунт</div>
    <div class="set-card" onclick="changeField('name')"><div class="set-card-content"><div class="set-card-label">Имя</div><span id="s-name">User</span></div><i data-lucide="chevron-right" style="color:var(--t3)"></i></div>
    <div class="set-card" onclick="changeField('nick')"><div class="set-card-content"><div class="set-card-label">Имя пользователя</div><span id="s-nick">@not_set</span></div><i data-lucide="chevron-right" style="color:var(--t3)"></i></div>
    <div class="set-card" style="cursor:default"><div class="set-card-content"><div class="set-card-label">Почта</div><span id="s-email">Email</span></div></div>
    <div class="set-card" onclick="changeField('bio')"><div class="set-card-content"><div class="set-card-label">О себе</div><span id="s-bio">Hate hate hate...</span></div><i data-lucide="chevron-right" style="color:var(--t3)"></i></div>

    <button class="btn-p" onclick="logout()" style="margin-top:40px; background:rgba(255,0,0,0.1); color:#ff4d4d">Выйти</button>
  </div>
</div>

<div id="create-modal" class="modal-overlay">
  <div class="settings-container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h1>Создать</h1>
        <i data-lucide="x" onclick="toggleModal('create-modal')" style="cursor:pointer"></i>
    </div>
    <select id="create-type" class="input-box" style="background: #e8f0fe;"><option value="group">Группа</option><option value="channel">Канал</option></select>
    <input type="text" id="create-name" class="input-box" placeholder="Название">
    <input type="text" id="create-members" class="input-box" placeholder="Участники (@user1, @user2)">
    <button class="btn-p" onclick="processCreate()">Создать</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, onSnapshot, addDoc, updateDoc, arrayUnion, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  // СКРЫТЫЕ НАСТРОЙКИ (В идеале вынести в .env на Vercel)
  const _K = ["AIzaSyA-PLDvaLnzoJWTWJb17U4FJU0ziQfL0eU", "hate-24365.firebaseapp.com", "hate-24365", "hate-24365.firebasestorage.app", "1:990484802574:web:56e00d91e1e58df144a05f"];
  const cfg = { apiKey: _K[0], authDomain: _K[1], projectId: _K[2], storageBucket: _K[3], appId: _K[4] };
  
  const app = initializeApp(cfg);
  const db = getFirestore(app);

  let _me = null, _to = null, _code = "", _mode = 'login', _sub = null, _chatsSub = null;
  const notify = (t) => { const el = document.getElementById('toast'); el.innerText = t; el.style.display = 'block'; setTimeout(() => el.style.display='none', 3000); };
  const updateIcons = () => lucide.createIcons();

  window.onload = async () => {
    const saved = localStorage.getItem('hate_session');
    if(saved) {
        const data = JSON.parse(saved);
        const s = await getDoc(doc(db, "users", data.email));
        if(s.exists()) { _me = { ...s.data(), email: data.email }; enterApp(); }
    }
  };

  window.setAuth = (m) => { _mode = m; document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.id === 't-'+m)); renderAuth(); };
  function renderAuth(step = 1) {
    const box = document.getElementById('auth-fields');
    if(_mode === 'login') box.innerHTML = `<input type="email" id="l-email" class="input-box" placeholder="Email"><input type="password" id="l-pass" class="input-box" placeholder="Пароль"><button class="btn-p" onclick="doLogin()">Войти</button>`;
    else {
      if(step === 1) box.innerHTML = `<input type="email" id="r-email" class="input-box" placeholder="Email"><button class="btn-p" onclick="sendCode()">Код</button>`;
      else if(step === 2) box.innerHTML = `<input type="text" id="r-code" class="input-box" style="text-align:center" placeholder="Код"><button class="btn-p" onclick="verify()">Ок</button>`;
      else box.innerHTML = `<input type="password" id="r-pass" class="input-box" placeholder="Пароль"><button class="btn-p" onclick="finishReg()">Готово</button>`;
    }
  }
  renderAuth();

  window.sendCode = async () => {
    const email = document.getElementById('r-email').value;
    _code = Math.floor(100000 + Math.random() * 900000).toString();
    await fetch('https://server-roan-omega.vercel.app/send-code', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ email, code: _code }) });
    renderAuth(2);
  };
  window.verify = () => { if(document.getElementById('r-code').value === _code) renderAuth(3); };
  window.finishReg = async () => {
    const email = document.getElementById('r-email').value, pass = document.getElementById('r-pass').value;
    const user = { name: "User", nick: "", bio: "hate hate hate, i hate it, hat all", password: pass, myChats: [], av: "" };
    await setDoc(doc(db, "users", email), user);
    _me = { ...user, email }; enterApp();
  };
  window.doLogin = async () => {
    const m = document.getElementById('l-email').value, p = document.getElementById('l-pass').value;
    const s = await getDoc(doc(db, "users", m));
    if(s.exists() && s.data().password === p) { _me = { ...s.data(), email: m }; enterApp(); } else notify("Ошибка");
  };

  function enterApp() {
    localStorage.setItem('hate_session', JSON.stringify({ email: _me.email, time: Date.now() }));
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    updateInfo(); listenMyChats();
  }

  function updateInfo() {
    document.getElementById('s-name').innerText = _me.name;
    document.getElementById('s-nick').innerText = _me.nick ? "@" + _me.nick : "не задан";
    document.getElementById('s-email').innerText = _me.email;
    document.getElementById('s-bio').innerText = _me.bio || "О себе";
    if(_me.av) document.getElementById('my-av-img').src = _me.av;
    updateIcons();
  }

  window.uploadAv = (input) => {
    const file = input.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onloadend = async () => {
        const img = new Image(); img.src = reader.result;
        img.onload = async () => {
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            canvas.width = 150; canvas.height = 150; ctx.drawImage(img, 0, 0, 150, 150);
            const compressed = canvas.toDataURL('image/jpeg', 0.6);
            await updateDoc(doc(db, "users", _me.email), { av: compressed });
            _me.av = compressed; updateInfo();
        };
    };
    reader.readAsDataURL(file);
  };

  window.toggleModal = (id) => { const m = document.getElementById(id); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; };

  window.changeField = async (t) => {
    let val = prompt("Введите значение:"); if(val === null) return;
    let up = {}; if(t === 'name') up.name = val; else if(t === 'nick') up.nick = val.replace('@','').toLowerCase(); else if(t === 'bio') up.bio = val;
    await updateDoc(doc(db, "users", _me.email), up); Object.assign(_me, up); updateInfo();
  };

  window.processCreate = async () => {
    const type = document.getElementById('create-type').value, name = document.getElementById('create-name').value.trim();
    if(!name) return notify("Название!");
    const docRef = await addDoc(collection(db, "groups"), { name, type, creator: _me.email, participants: [_me.email], time: Date.now() });
    await updateDoc(doc(db, "users", _me.email), { myChats: arrayUnion({ id: docRef.id, type: 'group' }) });
    toggleModal('create-modal');
  };

  function listenMyChats() {
    if(_chatsSub) _chatsSub();
    _chatsSub = onSnapshot(doc(db, "users", _me.email), async (snap) => {
        const list = document.getElementById('contacts'); list.innerHTML = "";
        const myChats = snap.data().myChats || [];
        for(let item of myChats) {
            let title = "", sub = "", av = "";
            if(item.type === 'group') {
                const gDoc = await getDoc(doc(db, "groups", item.id));
                if(!gDoc.exists()) continue;
                const g = gDoc.data();
                title = g.name; sub = g.type === 'group' ? 'Группа' : 'Канал';
                av = `<div class="av-main" style="background:#333">${title[0]}</div>`;
            } else {
                const uDoc = await getDoc(doc(db, "users", item.id));
                if(!uDoc.exists()) continue;
                const u = uDoc.data();
                title = u.name; sub = "@" + u.nick;
                av = u.av ? `<img src="${u.av}" class="av-main">` : `<div class="av-main">${title[0]}</div>`;
            }
            const div = document.createElement('div'); div.className = "contact-item";
            div.innerHTML = `${av}<div><b>${title}</b><div style="font-size:11px;color:var(--t3)">${sub}</div></div>`;
            div.onclick = () => openChat(item); list.appendChild(div);
        }
    });
  }

  window.openChat = async (item) => {
    _to = item;
    document.getElementById('chat-header').classList.remove('hidden');
    document.getElementById('input-bar').classList.remove('hidden');
    if(item.type === 'group') {
        const g = (await getDoc(doc(db, "groups", item.id))).data();
        document.getElementById('chat-title').innerText = g.name;
        document.getElementById('chat-av-box').innerHTML = g.name[0];
        if(g.type === 'channel' && g.creator !== _me.email) document.getElementById('input-bar').classList.add('hidden');
    } else {
        const u = (await getDoc(doc(db, "users", item.id))).data();
        document.getElementById('chat-title').innerText = u.name;
        document.getElementById('chat-av-box').innerHTML = u.av ? `<img src="${u.av}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">` : u.name[0];
    }
    if(window.innerWidth <= 768) document.getElementById('sidebar').classList.add('hide');
    loadMsgs();
  };

  function loadMsgs() {
    if(_sub) _sub();
    const path = _to.type === 'group' ? `groups/${_to.id}/messages` : `chats/${[_me.email, _to.id].sort().join('_')}/messages`;
    _sub = onSnapshot(query(collection(db, path), orderBy("time", "asc")), (s) => {
        const box = document.getElementById('messages'); box.innerHTML = "";
        s.forEach(d => {
            const m = d.data(); const div = document.createElement('div');
            div.className = `bubble ${m.from === _me.email ? 'me' : 'to'}`;
            div.innerText = m.text; box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
  }

  window.sendMsg = async () => {
    const inp = document.getElementById('msg-input'); if(!inp.value.trim()) return;
    const path = _to.type === 'group' ? `groups/${_to.id}/messages` : `chats/${[_me.email, _to.id].sort().join('_')}/messages`;
    if(_to.type !== 'group') {
        await updateDoc(doc(db, "users", _me.email), { myChats: arrayUnion({ id: _to.id, type: 'direct' }) });
        await updateDoc(doc(db, "users", _to.id), { myChats: arrayUnion({ id: _me.email, type: 'direct' }) });
    }
    await addDoc(collection(db, path), { from: _me.email, text: inp.value, time: Date.now() });
    inp.value = "";
  };

  document.getElementById('find').addEventListener('keypress', async (e) => {
    if(e.key === 'Enter') {
      const v = e.target.value.replace('@','').toLowerCase().trim();
      const q = query(collection(db, "users"), where("nick", "==", v));
      const s = await getDocs(q);
      s.forEach(d => { if(d.id !== _me.email) openChat({ id: d.id, type: 'direct' }); });
    }
  });

  window.closeChatMobile = () => document.getElementById('sidebar').classList.remove('hide');
  window.logout = () => { localStorage.removeItem('hate_session'); location.reload(); };
</script>
</body>
</html>
