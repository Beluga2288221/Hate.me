<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Hate Me</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root { --bg: #050505; --s1: #0f0f0f; --s2: #161616; --t1: #f0f0f0; --t3: #555; --acc: #ffffff; --bd: rgba(255,255,255,0.06); --on: #00ff66; --err: #ff4d4d; }
  * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--t1); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  @keyframes entrance { from { opacity: 0; transform: scale(1.05); filter: blur(10px); } to { opacity: 1; transform: scale(1); filter: blur(0); } }
  .anim-enter { animation: entrance 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

  #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .auth-card { width: 360px; background: rgba(15,15,15,0.8); backdrop-filter: blur(20px); padding: 40px; border-radius: 40px; border: 1px solid var(--bd); }
  .input-box { background: var(--s2); border: 1px solid var(--bd); padding: 16px; border-radius: 20px; color: #fff; width: 100%; margin-bottom: 12px; font-size: 14px; }
  .btn-p { background: var(--acc); color: #000; font-weight: 700; padding: 18px; border-radius: 20px; border: none; cursor: pointer; width: 100%; }

  #app-screen { display: none; flex: 1; width: 100%; position: relative; flex-direction: column; }
  .page { display: none; width: 100%; height: 100%; overflow-y: auto; padding-bottom: 20px; }
  .page.active { display: flex; flex-direction: column; }

  .nav-bar { height: 75px; background: var(--s1); border-top: 1px solid var(--bd); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
  .nav-item { color: var(--t3); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; flex: 1; transition: 0.2s; }
  .nav-item.active { color: #fff; }

  .bubble { max-width: 75%; padding: 14px 18px; border-radius: 22px; font-size: 14px; margin-bottom: 4px; line-height: 1.4; }
  .bubble.me { align-self: flex-end; background: var(--acc); color: #000; border-bottom-right-radius: 4px; }
  .bubble.to { align-self: flex-start; background: var(--s2); color: #fff; border-bottom-left-radius: 4px; }

  #chat-window { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: flex; flex-direction: column; transition: 0.3s transform; transform: translateY(100%); }
  #chat-window.open { transform: translateY(0); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card anim-enter">
    <div style="text-align:center; margin-bottom:30px; font-weight:700; font-size:32px; letter-spacing:-1px">Hate Me</div>
    <input type="email" id="email" class="input-box" placeholder="Email">
    <input type="password" id="pass" class="input-box" placeholder="Password">
    <button class="btn-p" onclick="login()">Connect</button>
    <div style="text-align:center; margin-top:20px; font-size:12px; color:var(--t3); cursor:pointer" onclick="reg()">Create account</div>
  </div>
</div>

<div id="app-screen">
  <div id="page-chats" class="page active">
    <div style="padding:25px; border-bottom:1px solid var(--bd)"><h2>Chats</h2></div>
    <div id="contacts-list" style="flex:1"></div>
  </div>

  <div id="page-search" class="page">
    <div style="padding:25px">
      <h2>Search</h2>
      <input type="text" id="search-user" class="input-box" placeholder="Type @username..." style="margin-top:15px">
      <div id="search-results"></div>
    </div>
  </div>

  <div id="page-profile" class="page">
    <div style="padding:40px 25px; text-align:center">
      <div id="my-av" style="width:100px; height:100px; border-radius:50%; background:#222; margin:0 auto 20px; overflow:hidden"></div>
      <h3 id="u-nick">@user</h3>
      <p id="u-id" style="color:var(--t3); font-size:11px; margin-top:5px">ID: 0</p>
      <div style="margin-top:30px; text-align:left">
        <div style="background:var(--s1); padding:20px; border-radius:20px; border:1px solid var(--bd)">
            <p style="color:var(--t3); font-size:10px; margin-bottom:8px; text-transform:uppercase">About</p>
            <div id="u-bio">hate hate hate...</div>
        </div>
      </div>
      <button class="btn-p" style="background:rgba(255,77,77,0.1); color:#ff4d4d; margin-top:40px" onclick="location.reload()">Logout</button>
    </div>
  </div>

  <nav class="nav-bar">
    <div class="nav-item active" onclick="switchTab('chats', this)"><i data-lucide="message-square"></i>Chats</div>
    <div class="nav-item" onclick="switchTab('search', this)"><i data-lucide="search"></i>Search</div>
    <div class="nav-item" onclick="switchTab('profile', this)"><i data-lucide="user"></i>Profile</div>
  </nav>
</div>

<div id="chat-window">
    <div style="padding:15px 20px; border-bottom:1px solid var(--bd); display:flex; align-items:center; gap:12px">
        <i data-lucide="chevron-left" onclick="closeChat()" style="cursor:pointer"></i>
        <div id="c-nick" style="font-weight:700">@nick</div>
    </div>
    <div id="messages-box" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column"></div>
    <div style="padding:20px; display:flex; gap:10px; background:var(--bg)">
        <input type="text" id="msg-input" class="input-box" placeholder="Message..." style="margin-bottom:0">
        <button onclick="sendMsg()" style="background:var(--acc); border:none; width:55px; height:52px; border-radius:20px; cursor:pointer"><i data-lucide="send" style="color:#000"></i></button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, onSnapshot, addDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const cfg = {
    apiKey: "AIzaSyA-PLDvaLnzoJWTWJb17U4FJU0ziQfL0eU",
    authDomain: "hate-24365.firebaseapp.com",
    projectId: "hate-24365",
    storageBucket: "hate-24365.firebasestorage.app",
    appId: "1:990484802574:web:56e00d91e1e58df144a05f"
  };

  const app = initializeApp(cfg);
  const db = getFirestore(app);
  let _me = null, _to = null, _sub = null;

  window.login = async () => {
    const e = document.getElementById('email').value.toLowerCase().trim();
    const p = document.getElementById('pass').value;
    const s = await getDoc(doc(db, "users", e));
    if(s.exists() && s.data().password === p) {
      _me = { ...s.data(), email: e };
      start();
    } else alert("Error");
  };

  window.reg = async () => {
    const e = document.getElementById('email').value.toLowerCase().trim();
    const p = document.getElementById('pass').value;
    if(!e || p.length < 6) return alert("Min 6 chars");
    const s = await getDoc(doc(db, "users", e));
    if(s.exists()) return alert("Exists");
    const u = { name: "User", nick: e.split('@')[0], password: p, bio: "hate hate hate...", myChats: [], av: "", id: Date.now() };
    await setDoc(doc(db, "users", e), u);
    _me = { ...u, email: e };
    start();
  };

  function start() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app-screen').style.display = 'flex';
    document.getElementById('u-nick').innerText = "@" + _me.nick;
    document.getElementById('u-id').innerText = "ID: " + _me.id;
    lucide.createIcons();
    loadContacts();
  }

  window.switchTab = (id, el) => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    el.classList.add('active');
  };

  document.getElementById('search-user').onkeypress = async (e) => {
    if(e.key === 'Enter') {
      const v = e.target.value.replace('@','');
      const q = query(collection(db, "users"), where("nick", "==", v));
      const s = await getDocs(q);
      const res = document.getElementById('search-results');
      res.innerHTML = "";
      s.forEach(d => {
        const u = d.data();
        if(d.id === _me.email) return;
        const div = document.createElement('div');
        div.style = "padding:15px; background:var(--s1); border-radius:15px; margin-top:10px; cursor:pointer";
        div.innerHTML = `<b>@${u.nick}</b>`;
        div.onclick = () => openChat(u, d.id);
        res.appendChild(div);
      });
    }
  };

  function openChat(user, email) {
    _to = { ...user, email: email };
    document.getElementById('c-nick').innerText = "@" + user.nick;
    document.getElementById('chat-window').classList.add('open');
    loadMsgs();
  }

  window.closeChat = () => {
    document.getElementById('chat-window').classList.remove('open');
    if(_sub) _sub();
  };

  async function loadMsgs() {
    const id = [_me.email, _to.email].sort().join('_');
    _sub = onSnapshot(collection(db, "chats", id, "messages"), (s) => {
      const box = document.getElementById('messages-box');
      box.innerHTML = "";
      let m = []; s.forEach(d => m.push(d.data()));
      m.sort((a,b) => a.time - b.time).forEach(i => {
        const d = document.createElement('div');
        d.className = `bubble ${i.from === _me.email ? 'me' : 'to'}`;
        d.innerText = i.text;
        box.appendChild(d);
      });
      box.scrollTop = box.scrollHeight;
    });
  }

  window.sendMsg = async () => {
    const i = document.getElementById('msg-input');
    if(!i.value.trim()) return;
    const id = [_me.email, _to.email].sort().join('_');
    await updateDoc(doc(db, "users", _me.email), { myChats: arrayUnion(_to.email) });
    await updateDoc(doc(db, "users", _to.email), { myChats: arrayUnion(_me.email) });
    await addDoc(collection(db, "chats", id, "messages"), { from: _me.email, text: i.value, time: Date.now() });
    i.value = "";
  };

  function loadContacts() {
    onSnapshot(doc(db, "users", _me.email), (s) => {
        const list = document.getElementById('contacts-list');
        list.innerHTML = "";
        const chats = s.data().myChats || [];
        chats.forEach(async (email) => {
            const u = await getDoc(doc(db, "users", email));
            const div = document.createElement('div');
            div.style = "padding:20px; border-bottom:1px solid var(--bd); cursor:pointer";
            div.innerHTML = `<b>@${u.data().nick}</b>`;
            div.onclick = () => openChat(u.data(), email);
            list.appendChild(div);
        });
    });
  }

  lucide.createIcons();
</script>
</body>
</html>
