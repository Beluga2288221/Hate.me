<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Hate Me</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root { --bg: #050505; --s1: #0f0f0f; --s2: #161616; --t1: #f0f0f0; --t3: #555; --acc: #ffffff; --bd: rgba(255,255,255,0.06); --on: #00ff66; --err: #ff4d4d; }
  * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--t1); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; }

  /* АНИМАЦИИ */
  @keyframes entrance { from { opacity: 0; transform: scale(1.05); filter: blur(10px); } to { opacity: 1; transform: scale(1); filter: blur(0); } }
  @keyframes msgPop { from { transform: scale(0.9) translateY(10px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
  .anim-enter { animation: entrance 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
  .anim-msg { animation: msgPop 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }

  /* ЛОГОТИП */
  .logo-container { margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
  .logo-main { display: flex; flex-direction: column; line-height: 0.8; font-weight: 700; font-size: 64px; letter-spacing: -4px; }
  .logo-main .hate { color: var(--t3); }
  .logo-main .me { color: #fff; margin-left: 45px; }

  /* АВТО-ОПРЕДЕЛЕНИЕ УСТРОЙСТВА */
  #app-screen { display: none; width: 100%; height: 100vh; }
  .sidebar { width: 350px; border-right: 1px solid var(--bd); background: var(--s1); display: flex; flex-direction: column; transition: 0.4s; z-index: 10; }
  .chat-area { flex: 1; display: flex; flex-direction: column; background: #080808; position: relative; }

  @media (max-width: 768px) {
    .sidebar { width: 100%; position: absolute; left: 0; top: 0; height: 100%; }
    .sidebar.mobile-hide { transform: translateX(-100%); }
  }

  /* AUTH STYLES */
  #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .auth-card { width: 360px; background: rgba(15,15,15,0.8); backdrop-filter: blur(20px); padding: 40px; border-radius: 40px; border: 1px solid var(--bd); }
  .auth-step { display: none; }
  .auth-step.active { display: block; }
  
  .input-box { background: var(--s2); border: 1px solid var(--bd); padding: 16px; border-radius: 20px; color: #fff; width: 100%; margin-bottom: 12px; font-size: 14px; }
  .btn-p { background: var(--acc); color: #000; font-weight: 700; padding: 18px; border-radius: 20px; border: none; cursor: pointer; width: 100%; transition: 0.3s; }
  .btn-p:disabled { background: #333; color: #666; cursor: not-allowed; }

  .bubble { max-width: 75%; padding: 14px 18px; border-radius: 22px; font-size: 14px; margin-bottom: 4px; }
  .bubble.me { align-self: flex-end; background: var(--acc); color: #000; border-bottom-right-radius: 4px; }
  .bubble.to { align-self: flex-start; background: var(--s2); color: #fff; border-bottom-left-radius: 4px; }

  #settings { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 3000; display: none; align-items: center; justify-content: center; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="logo-container anim-enter">
    <div class="logo-main"><span class="hate">Hate</span><span class="me">Me</span></div>
  </div>

  <div class="auth-card anim-enter">
    <div id="box-login" class="auth-step active">
      <h3 style="margin-bottom:20px; text-align:center">Вход</h3>
      <input type="email" id="l-email" class="input-box" placeholder="Email">
      <input type="password" id="l-pass" class="input-box" placeholder="Password">
      <button class="btn-p" onclick="doLogin()">Connect</button>
      <p style="text-align:center; margin-top:20px; font-size:12px; color:var(--t3); cursor:pointer" onclick="goStep('reg-1')">Создать аккаунт</p>
    </div>

    <div id="box-reg-1" class="auth-step">
      <h3 style="margin-bottom:20px; text-align:center">Регистрация</h3>
      <input type="email" id="r-email" class="input-box" placeholder="Email">
      <button class="btn-p" id="btn-code" onclick="sendCode()">Получить код</button>
      <p style="text-align:center; margin-top:20px; font-size:12px; color:var(--t3); cursor:pointer" onclick="goStep('login')">Назад ко входу</p>
    </div>

    <div id="box-reg-2" class="auth-step">
      <h3 style="margin-bottom:20px; text-align:center">Проверка кода</h3>
      <p style="font-size:11px; color:var(--t3); text-align:center; margin-bottom:15px">Мы отправили код на вашу почту</p>
      <input type="text" id="r-code" class="input-box" placeholder="000000" style="text-align:center; letter-spacing:5px">
      <button class="btn-p" onclick="verifyCode()">Подтвердить</button>
    </div>

    <div id="box-reg-3" class="auth-step">
      <h3 style="margin-bottom:20px; text-align:center">Новый пароль</h3>
      <input type="password" id="r-pass" class="input-box" placeholder="Только латиница">
      <button class="btn-p" onclick="finishReg()">Завершить</button>
    </div>
  </div>
</div>

<div id="app-screen">
  <aside class="sidebar" id="side-ui">
    <div style="padding:30px 25px; display:flex; justify-content:space-between; align-items:center">
      <h2 style="letter-spacing:-1px">Chats</h2>
      <i data-lucide="settings" style="cursor:pointer; color:var(--t3)" onclick="openSet()"></i>
    </div>
    <div style="padding:0 20px 20px"><input type="text" id="find" class="input-box" placeholder="Поиск @user + Enter"></div>
    <div id="contacts" style="flex:1; overflow-y:auto"></div>
    <div style="padding:20px; border-top:1px solid var(--bd); display:flex; align-items:center; gap:12px">
      <div id="my-av" style="width:40px; height:40px; border-radius:50%; background:#222; overflow:hidden"></div>
      <div style="flex:1">
        <div id="u-nick" style="font-weight:700; font-size:14px; color:var(--t3)">@no_user</div>
        <div id="u-id" style="font-size:10px; color:var(--t3)">Hate ID: 0</div>
      </div>
    </div>
  </aside>

  <main class="chat-area">
    <div id="header" style="padding:15px 25px; border-bottom:1px solid var(--bd); display:flex; align-items:center; gap:12px" class="hidden">
      <i data-lucide="chevron-left" class="mobile-only" onclick="backToList()" style="cursor:pointer"></i>
      <div id="c-av" style="width:38px; height:38px; border-radius:50%; background:#222; overflow:hidden"></div>
      <div><div id="c-nick" style="font-weight:700">@nick</div><div id="c-status" style="font-size:10px; color:var(--on)">online</div></div>
    </div>
    <div id="messages" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column"></div>
    <div id="input-ui" style="padding:20px; display:flex; gap:12px" class="hidden">
      <input type="text" id="msg-t" class="input-box" placeholder="Сообщение..." style="margin-bottom:0; border-radius:18px">
      <button onclick="send()" style="background:var(--acc); border:none; width:52px; height:52px; border-radius:18px; cursor:pointer"><i data-lucide="send" style="color:#000"></i></button>
    </div>
  </main>
</div>

<div id="settings">
  <div class="auth-card">
    <h2 style="margin-bottom:25px">Профиль</h2>
    <div style="margin-bottom:15px">
      <label style="font-size:10px; color:var(--t3); text-transform:uppercase">Твой ник (от 5 букв, латиница)</label>
      <input type="text" id="set-n" class="input-box" placeholder="@username" style="margin-top:5px">
    </div>
    <div style="margin-bottom:15px">
      <label style="font-size:10px; color:var(--t3); text-transform:uppercase">О себе</label>
      <textarea id="set-a" class="input-box" placeholder="Hate me..." rows="2" style="margin-top:5px"></textarea>
    </div>
    <div style="margin-bottom:25px">
      <label style="font-size:10px; color:var(--t3); text-transform:uppercase">Ссылка на аватар</label>
      <input type="text" id="set-v" class="input-box" placeholder="https://..." style="margin-top:5px">
    </div>
    <button class="btn-p" onclick="saveSet()">Сохранить</button>
    <button style="background:none; border:none; color:var(--t3); margin-top:15px; cursor:pointer; width:100%" onclick="closeSet()">Закрыть</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, onSnapshot, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const cfg = { apiKey: "AIzaSyA-PLDvaLnzoJWTWJb17U4FJU0ziQfL0eU", authDomain: "hate-24365.firebaseapp.com", projectId: "hate-24365", storageBucket: "hate-24365.firebasestorage.app", appId: "1:990484802574:web:56e00d91e1e58df144a05f" };
  const app = initializeApp(cfg);
  const db = getFirestore(app);
  
  let _me = null, _to = null, _sub = null, _sentCode = "";

  lucide.createIcons();

  // ПЕРЕКЛЮЧЕНИЕ ШАГОВ
  window.goStep = (step) => {
    document.querySelectorAll('.auth-step').forEach(s => s.classList.remove('active'));
    document.getElementById('box-' + step).classList.add('active');
  };

  // ЛОГИКА РЕГИСТРАЦИИ
  window.sendCode = async () => {
    const email = document.getElementById('r-email').value;
    if(!email.includes('@')) return alert("Неверный email");
    
    const snap = await getDoc(doc(db, "users", email));
    if(snap.exists()) return alert("Этот email уже занят");

    _sentCode = Math.floor(100000 + Math.random() * 900000).toString();
    const btn = document.getElementById('btn-code');
    btn.disabled = true;

    try {
        await fetch('https://server-roan-omega.vercel.app/send-code', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email: email, code: _sentCode })
        });
        goStep('reg-2');
    } catch(e) { alert("Ошибка отправки"); btn.disabled = false; }
  };

  window.verifyCode = () => {
    const code = document.getElementById('r-code').value;
    if(code === _sentCode) goStep('reg-3');
    else alert("Неверный код");
  };

  window.finishReg = async () => {
    const pass = document.getElementById('r-pass').value;
    const email = document.getElementById('r-email').value;
    if(!/^[a-zA-Z0-9]+$/.test(pass)) return alert("Пароль должен быть на латинице");
    
    const id = Math.floor(10000000 + Math.random() * 90000000);
    const user = { nick: "user"+id, password: pass, id: id, about: "", av: "", status: "online" };
    
    await setDoc(doc(db, "users", email), user);
    _me = { ...user, email: email };
    enterApp();
  };

  // ВХОД
  window.doLogin = async () => {
    const m = document.getElementById('l-email').value;
    const p = document.getElementById('l-pass').value;
    const s = await getDoc(doc(db, "users", m));
    if(s.exists() && s.data().password === p) {
      _me = { ...s.data(), email: m };
      enterApp();
    } else alert("Ошибка входа");
  };

  function enterApp() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app-screen').style.display = 'flex';
    initApp();
  }

  function initApp() {
    document.getElementById('u-nick').innerText = "@" + _me.nick;
    document.getElementById('u-id').innerText = "Hate ID: " + _me.id;
    if(_me.av) document.getElementById('my-av').innerHTML = `<img src="${_me.av}" style="width:100%;height:100%;object-fit:cover">`;
    updateDoc(doc(db, "users", _me.email), { status: 'online' });
  }

  // НАСТРОЙКИ (NICKNAME)
  window.openSet = () => {
    document.getElementById('set-n').value = _me.nick === "user"+_me.id ? "" : _me.nick;
    document.getElementById('set-a').value = _me.about || "";
    document.getElementById('set-v').value = _me.av || "";
    document.getElementById('settings').style.display = 'flex';
  };

  window.closeSet = () => document.getElementById('settings').style.display = 'none';

  window.saveSet = async () => {
    const n = document.getElementById('set-n').value.trim();
    const a = document.getElementById('set-a').value;
    const v = document.getElementById('set-v').value;

    if(!/^[a-zA-Z0-9_]+$/.test(n)) return alert("Ник только на латинице!");
    if(n.length < 5) return alert("Ник должен быть от 5 символов!");

    // Проверка уникальности
    const q = query(collection(db, "users"), where("nick", "==", n));
    const s = await getDocs(q);
    if(!s.empty && n !== _me.nick) return alert("Этот ник уже занят!");

    await updateDoc(doc(db, "users", _me.email), { nick: n, about: a, av: v });
    _me.nick = n; _me.av = v;
    initApp(); closeSet();
  };

  // ПОИСК И ЧАТ
  document.getElementById('find').addEventListener('keypress', async (e) => {
    if(e.key === 'Enter') {
      const v = e.target.value.replace('@','');
      const q = query(collection(db, "users"), where("nick", "==", v));
      const s = await getDocs(q);
      const list = document.getElementById('contacts');
      list.innerHTML = "";
      if(s.empty) list.innerHTML = "<div style='padding:20px; color:gray'>Пользователь не найден</div>";
      s.forEach(d => {
        const u = d.data();
        const div = document.createElement('div');
        div.style = "padding:15px 20px; display:flex; align-items:center; gap:12px; cursor:pointer";
        div.innerHTML = `<img src="${u.av||''}" style="width:40px;height:40px;border-radius:50%;background:#222;object-fit:cover"><div><b>@${u.nick}</b><div style="font-size:10px;color:var(--on)">online</div></div>`;
        div.onclick = () => openChat(u, d.id);
        list.appendChild(div);
      });
    }
  });

  function openChat(user, email) {
    if(_me.nick.startsWith('user')) return alert("Установите свой @user в настройках перед общением!");
    _to = { ...user, email: email };
    document.getElementById('header').classList.remove('hidden');
    document.getElementById('input-ui').classList.remove('hidden');
    document.getElementById('c-nick').innerText = "@" + user.nick;
    if(user.av) document.getElementById('c-av').innerHTML = `<img src="${user.av}" style="width:100%;height:100%;object-fit:cover">`;
    if(window.innerWidth < 768) document.getElementById('side-ui').classList.add('mobile-hide');
    loadMsgs();
  }

  window.backToList = () => document.getElementById('side-ui').classList.remove('mobile-hide');

  function loadMsgs() {
    if(_sub) _sub();
    const id = [_me.email, _to.email].sort().join('_');
    _sub = onSnapshot(collection(db, "chats", id, "messages"), (s) => {
      const box = document.getElementById('messages');
      box.innerHTML = "";
      let ms = []; s.forEach(d => ms.push(d.data()));
      ms.sort((a,b) => a.time - b.time).forEach(m => {
        const d = document.createElement('div');
        d.className = `bubble anim-msg ${m.from === _me.email ? 'me' : 'to'}`;
        d.innerText = m.text;
        box.appendChild(d);
      });
      box.scrollTop = box.scrollHeight;
    });
  }

  window.send = async () => {
    const t = document.getElementById('msg-t');
    if(!t.value.trim()) return;
    const id = [_me.email, _to.email].sort().join('_');
    await addDoc(collection(db, "chats", id, "messages"), { from: _me.email, text: t.value, time: Date.now() });
    t.value = "";
  };
</script>
</body>
</html>
